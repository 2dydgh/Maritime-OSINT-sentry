        const proximityDataSource = new Cesium.CustomDataSource('Proximity');
        viewer.dataSources.add(proximityDataSource);

        /**
         * Haversine distance between two points in decimal degrees.
         * Returns distance in nautical miles.
         */
        function haversineNm(lat1, lon1, lat2, lon2) {
            const R = 3440.065; // Earth radius in nautical miles
            const toRad = Math.PI / 180;
            const dLat = (lat2 - lat1) * toRad;
            const dLon = (lon2 - lon1) * toRad;
            const a = Math.sin(dLat / 2) ** 2 +
                Math.cos(lat1 * toRad) * Math.cos(lat2 * toRad) *
                Math.sin(dLon / 2) ** 2;
            return 2 * R * Math.asin(Math.sqrt(a));
        }

        /**
         * Project a position forward along a bearing (COG) by a given distance.
         * Returns {lat, lng} in degrees.
         */
        function projectPosition(lat, lng, cogDeg, distNm) {
            const R = 3440.065;
            const toRad = Math.PI / 180;
            const toDeg = 180 / Math.PI;
            const lat1 = lat * toRad;
            const lon1 = lng * toRad;
            const brng = cogDeg * toRad;
            const d = distNm / R;
            const lat2 = Math.asin(Math.sin(lat1) * Math.cos(d) + Math.cos(lat1) * Math.sin(d) * Math.cos(brng));
            const lon2 = lon1 + Math.atan2(Math.sin(brng) * Math.sin(d) * Math.cos(lat1),
                Math.cos(d) - Math.sin(lat1) * Math.sin(lat2));
            return { lat: lat2 * toDeg, lng: lon2 * toDeg };
        }

        /**
         * Compute CPA (Closest Point of Approach) position and time.
         * Uses relative velocity method. Returns {lat, lng, tcpaMin, dcpaNm}.
         */
        function computeCpa(shipA, shipB) {
            const toRad = Math.PI / 180;
            const nmPerDeg = 60;
            const sogA = shipA.sog || 0, cogA = (shipA.cog || 0) * toRad;
            const sogB = shipB.sog || 0, cogB = (shipB.cog || 0) * toRad;
            const vxA = (sogA / 60) * Math.sin(cogA), vyA = (sogA / 60) * Math.cos(cogA);
            const vxB = (sogB / 60) * Math.sin(cogB), vyB = (sogB / 60) * Math.cos(cogB);
            const dLat = (shipB.lat - shipA.lat) * nmPerDeg;
            const dLng = (shipB.lng - shipA.lng) * nmPerDeg * Math.cos(((shipA.lat + shipB.lat) / 2) * toRad);
            const dvx = vxB - vxA, dvy = vyB - vyA;
            const v2 = dvx * dvx + dvy * dvy;
            if (v2 < 1e-10) {
                return { lat: (shipA.lat + shipB.lat) / 2, lng: (shipA.lng + shipB.lng) / 2, tcpaMin: 0, dcpaNm: Math.sqrt(dLat * dLat + dLng * dLng) };
            }
            const tcpa = -(dLat * dvy + dLng * dvx) / v2;
            const tcpaMin = Math.max(tcpa, 0);
            const cpaA = projectPosition(shipA.lat, shipA.lng, shipA.cog || 0, (sogA / 60) * tcpaMin);
            const cpaB = projectPosition(shipB.lat, shipB.lng, shipB.cog || 0, (sogB / 60) * tcpaMin);
            const dcpaNm = haversineNm(cpaA.lat, cpaA.lng, cpaB.lat, cpaB.lng);
            return {
                lat: (cpaA.lat + cpaB.lat) / 2,
                lng: (cpaA.lng + cpaB.lng) / 2,
                tcpaMin, dcpaNm
            };
        }

        /**
         * Find nearby vessels within radius, sorted by distance, max count.
         * Only includes vessels present in the latest WebSocket payload (not stale).
         */
        function findNearbyVesselsCandidates(mmsi, radiusNm, maxCount) {
            const selected = shipDataMap[mmsi];
            if (!selected) return { selected, results: [] };

            const results = [];
            for (const [key, vessel] of Object.entries(shipDataMap)) {
                if (key == mmsi) continue;
                if (!latestWsShipsMmsis.has(vessel.mmsi)) continue;

                const dist = haversineNm(selected.lat, selected.lng, vessel.lat, vessel.lng);
                if (dist <= radiusNm) {
                    results.push({
                        mmsi: vessel.mmsi,
                        name: vessel.name || 'UNKNOWN',
                        distance: dist,
                        lat: vessel.lat,
                        lng: vessel.lng
                    });
                }
            }

            results.sort((a, b) => a.distance - b.distance);
            return { selected, results: results.slice(0, maxCount) };
        }

        // 육지 차폐 캐시: "mmsi_a:mmsi_b" → { blocked: bool, ts: number }
        const _landCache = new Map();
        const LAND_CACHE_TTL_MS = 30000; // 30초 캐시

        async function findNearbyVessels(mmsi, radiusNm, maxCount) {
            const { selected, results } = findNearbyVesselsCandidates(mmsi, radiusNm, maxCount);
            if (!selected || results.length === 0) return results;

            const now = Date.now();
            const unchecked = []; // 캐시에 없거나 만료된 항목
            const uncheckedIdx = [];

            // 캐시 확인
            for (let i = 0; i < results.length; i++) {
                const key = mmsi < results[i].mmsi
                    ? `${mmsi}:${results[i].mmsi}`
                    : `${results[i].mmsi}:${mmsi}`;
                const cached = _landCache.get(key);
                if (cached && (now - cached.ts) < LAND_CACHE_TTL_MS) {
                    continue; // 캐시 유효
                }
                unchecked.push(results[i]);
                uncheckedIdx.push(i);
            }

            // 캐시에 없는 항목만 API 호출
            if (unchecked.length > 0) {
                try {
                    const pairs = unchecked.map(nv => ({
                        lat1: selected.lat, lon1: selected.lng,
                        lat2: nv.lat, lon2: nv.lng
                    }));
                    const resp = await fetch('/api/v1/collision/land-check-batch', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(pairs)
                    });
                    if (resp.ok) {
                        const { results: blocked } = await resp.json();
                        for (let j = 0; j < unchecked.length; j++) {
                            const key = mmsi < unchecked[j].mmsi
                                ? `${mmsi}:${unchecked[j].mmsi}`
                                : `${unchecked[j].mmsi}:${mmsi}`;
                            _landCache.set(key, { blocked: blocked[j], ts: now });
                        }
                    }
                } catch (e) {
                    console.warn('Land check failed, showing all:', e);
                }
            }

            // 캐시 기반 필터링
            return results.filter(nv => {
                const key = mmsi < nv.mmsi
                    ? `${mmsi}:${nv.mmsi}`
                    : `${nv.mmsi}:${mmsi}`;
                const cached = _landCache.get(key);
                return !cached || !cached.blocked;
            });
        }

        function proximityColor(distNm) {
            if (distNm < 2) return { css: '#ef4444', cesium: Cesium.Color.fromCssColorString('#ef4444') };
            if (distNm < 5) return { css: '#eab308', cesium: Cesium.Color.fromCssColorString('#eab308') };
            return { css: '#10b981', cesium: Cesium.Color.fromCssColorString('#10b981') };
        }

        // ML risk_level 0~3 → 색상
        const ML_RISK_COLORS = {
            3: '#f43f5e',  // 위험 — 빨강
            2: '#f97316',  // 경고 — 주황
            1: '#eab308',  // 주의 — 노랑
            0: '#10b981',  // 안전 — 초록
        };
        function mlRiskColor(riskLevel) {
            const css = ML_RISK_COLORS[riskLevel] || '#10b981';
            return { css, cesium: Cesium.Color.fromCssColorString(css) };
        }

        const ML_RISK_LABELS = { 3: '위험', 2: '경고', 1: '주의' };

        /**
         * 선택된 선박의 MMSI로 캐시된 ML 결과에서 매칭되는 위험도를 찾아
         * nearby 선박 배열에 mlRiskLevel/mlRiskLabel을 주입한다.
         */
        function enrichNearbyWithMlRisk(selectedMmsi, nearbyVessels) {
            // ML 위험도 매칭
            const mlRisks = (collisionData.ml && collisionData.ml.risks) || [];
            const mlRiskMap = {};
            mlRisks.forEach(r => {
                if (r.ship_a.mmsi == selectedMmsi) {
                    mlRiskMap[r.ship_b.mmsi] = r;
                } else if (r.ship_b.mmsi == selectedMmsi) {
                    mlRiskMap[r.ship_a.mmsi] = r;
                }
            });

            // 거리 기반 위험도 매칭
            const distRisks = (collisionData.distance && collisionData.distance.risks) || [];
            const distRiskMap = {};
            distRisks.forEach(r => {
                if (r.ship_a.mmsi == selectedMmsi) {
                    distRiskMap[r.ship_b.mmsi] = r;
                } else if (r.ship_b.mmsi == selectedMmsi) {
                    distRiskMap[r.ship_a.mmsi] = r;
                }
            });

            const DIST_SEVERITY_LABELS = { danger: '위험', warning: '경고' };

            nearbyVessels.forEach(nv => {
                const mlMatch = mlRiskMap[nv.mmsi];
                const distMatch = distRiskMap[nv.mmsi];
                if (mlMatch) {
                    nv.mlRiskLevel = mlMatch.risk_level;
                    nv.mlRiskLabel = mlMatch.risk_label || ML_RISK_LABELS[mlMatch.risk_level] || '';
                }
                if (distMatch) {
                    nv.distSeverity = distMatch.severity;
                    nv.distRiskLabel = DIST_SEVERITY_LABELS[distMatch.severity] || distMatch.severity;
                }
            });
        }

        function renderProximityLines(selectedMmsi, nearbyVessels) {
            proximityDataSource.entities.removeAll();
            // Clear 2D proximity
            if (currentMapMode === '2d' && leafletMap) {
                Object.values(leafletCollisionLines).forEach(l => leafletMap.removeLayer(l));
                leafletCollisionLines = {};
            }
            const selected = shipDataMap[selectedMmsi];
            if (!selected || nearbyVessels.length === 0) return;

            const closestMmsi = nearbyVessels[0].mmsi;

            nearbyVessels.forEach(nv => {
                const isCollisionTarget = collisionTargetMmsi != null && (nv.mmsi == collisionTargetMmsi);
                const isMlPair = nv.mlRiskLevel != null;
                const color = isMlPair
                    ? mlRiskColor(nv.mlRiskLevel)
                    : isCollisionTarget
                        ? { css: '#f43f5e', cesium: Cesium.Color.fromCssColorString('#f43f5e') }
                        : proximityColor(nv.distance);
                const isHighlight = isMlPair || isCollisionTarget || nv.mmsi === closestMmsi;
                const showCollisionViz = isMlPair || isCollisionTarget;

                // ── Main proximity polyline ──
                proximityDataSource.entities.add({
                    id: `prox-line-${nv.mmsi}`,
                    polyline: {
                        positions: new Cesium.CallbackProperty(() => {
                            const sel = shipDataMap[selectedMmsi];
                            const tgt = shipDataMap[nv.mmsi];
                            if (!sel || !tgt) return [];
                            return Cesium.Cartesian3.fromDegreesArrayHeights([
                                sel.lng, sel.lat, 50, tgt.lng, tgt.lat, 50
                            ]);
                        }, false),
                        width: isMlPair ? 4 : isCollisionTarget ? 4 : isHighlight ? 3 : 2,
                        material: isHighlight
                            ? new Cesium.PolylineGlowMaterialProperty({
                                color: new Cesium.CallbackProperty(() => {
                                    const speed = isMlPair ? 300 : isCollisionTarget ? 300 : 500;
                                    const alpha = 0.4 + 0.6 * Math.abs(Math.sin(Date.now() / speed));
                                    return color.cesium.withAlpha(alpha);
                                }, false),
                                glowPower: isMlPair ? 0.5 : isCollisionTarget ? 0.5 : 0.3
                            })
                            : new Cesium.ColorMaterialProperty(color.cesium.withAlpha(0.6)),
                        clampToGround: false
                    }
                });

                // ── Label at midpoint ──
                proximityDataSource.entities.add({
                    id: `prox-label-${nv.mmsi}`,
                    position: new Cesium.CallbackProperty(() => {
                        const sel = shipDataMap[selectedMmsi];
                        const tgt = shipDataMap[nv.mmsi];
                        if (!sel || !tgt) return Cesium.Cartesian3.fromDegrees(0, 0);
                        return Cesium.Cartesian3.fromDegrees(
                            (sel.lng + tgt.lng) / 2,
                            (sel.lat + tgt.lat) / 2
                        );
                    }, false),
                    label: {
                        text: new Cesium.CallbackProperty(() => {
                            const sel = shipDataMap[selectedMmsi];
                            const tgt = shipDataMap[nv.mmsi];
                            if (!sel || !tgt) return '';
                            const d = haversineNm(sel.lat, sel.lng, tgt.lat, tgt.lng);
                            const prefix = isMlPair ? '⚠ ' : isCollisionTarget ? '⚠ ' : '';
                            return prefix + d.toFixed(1) + ' nm';
                        }, false),
                        font: isCollisionTarget ? 'bold 14px JetBrains Mono' : '12px JetBrains Mono',
                        fillColor: color.cesium,
                        outlineColor: Cesium.Color.BLACK,
                        outlineWidth: 3,
                        style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                        pixelOffset: new Cesium.Cartesian2(0, -12),
                        disableDepthTestDistance: Number.POSITIVE_INFINITY
                    }
                });

                // ── Collision visualization (COG lines + CPA marker + risk zone) ──
                if (showCollisionViz) {
                    const sel = shipDataMap[selectedMmsi];
                    const tgt = shipDataMap[nv.mmsi];
                    if (!sel || !tgt) return;

                    const selSog = sel.sog || 0, selCog = sel.cog || 0;
                    const tgtSog = tgt.sog || 0, tgtCog = tgt.cog || 0;

                    // COG projection distance: speed * 10 min (nm), min 0.5nm for visibility
                    const selProjDist = Math.max((selSog / 60) * 10, 0.5);
                    const tgtProjDist = Math.max((tgtSog / 60) * 10, 0.5);

                    // ① COG projection line — selected ship (dashed)
                    proximityDataSource.entities.add({
                        id: `cog-sel-${nv.mmsi}`,
                        polyline: {
                            positions: new Cesium.CallbackProperty(() => {
                                const s = shipDataMap[selectedMmsi];
                                if (!s) return [];
                                const end = projectPosition(s.lat, s.lng, s.cog || 0, Math.max((s.sog || 0) / 60 * 10, 0.5));
                                return Cesium.Cartesian3.fromDegreesArrayHeights([s.lng, s.lat, 50, end.lng, end.lat, 50]);
                            }, false),
                            width: 2,
                            material: new Cesium.PolylineDashMaterialProperty({
                                color: color.cesium.withAlpha(0.7),
                                dashLength: 12
                            }),
                            clampToGround: false
                        }
                    });

                    // ① COG projection line — target ship (dashed)
                    proximityDataSource.entities.add({
                        id: `cog-tgt-${nv.mmsi}`,
                        polyline: {
                            positions: new Cesium.CallbackProperty(() => {
                                const t = shipDataMap[nv.mmsi];
                                if (!t) return [];
                                const end = projectPosition(t.lat, t.lng, t.cog || 0, Math.max((t.sog || 0) / 60 * 10, 0.5));
                                return Cesium.Cartesian3.fromDegreesArrayHeights([t.lng, t.lat, 50, end.lng, end.lat, 50]);
                            }, false),
                            width: 2,
                            material: new Cesium.PolylineDashMaterialProperty({
                                color: color.cesium.withAlpha(0.7),
                                dashLength: 12
                            }),
                            clampToGround: false
                        }
                    });

                    // ② CPA point marker + ③ risk zone circle
                    const cpa = computeCpa(sel, tgt);
                    if (cpa.tcpaMin > 0 && cpa.tcpaMin < 60) {
                        // CPA marker (X shape via point + label)
                        proximityDataSource.entities.add({
                            id: `cpa-marker-${nv.mmsi}`,
                            position: new Cesium.CallbackProperty(() => {
                                const s = shipDataMap[selectedMmsi];
                                const t = shipDataMap[nv.mmsi];
                                if (!s || !t) return Cesium.Cartesian3.fromDegrees(0, 0);
                                const c = computeCpa(s, t);
                                return Cesium.Cartesian3.fromDegrees(c.lng, c.lat);
                            }, false),
                            point: {
                                pixelSize: 10,
                                color: color.cesium.withAlpha(0.9),
                                outlineColor: Cesium.Color.WHITE,
                                outlineWidth: 2,
                                disableDepthTestDistance: Number.POSITIVE_INFINITY
                            },
                            label: {
                                text: new Cesium.CallbackProperty(() => {
                                    const s = shipDataMap[selectedMmsi];
                                    const t = shipDataMap[nv.mmsi];
                                    if (!s || !t) return '';
                                    const c = computeCpa(s, t);
                                    return `CPA ${c.dcpaNm.toFixed(2)}nm\n${c.tcpaMin.toFixed(1)}min`;
                                }, false),
                                font: 'bold 11px JetBrains Mono',
                                fillColor: Cesium.Color.WHITE,
                                outlineColor: Cesium.Color.BLACK,
                                outlineWidth: 3,
                                style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                                pixelOffset: new Cesium.Cartesian2(0, -20),
                                disableDepthTestDistance: Number.POSITIVE_INFINITY,
                                showBackground: true,
                                backgroundColor: color.cesium.withAlpha(0.7)
                            }
                        });

                        // ③ Risk zone — semi-transparent ellipse at CPA point
                        // Radius based on DCPA: min 200m, scaled for visibility
                        const riskRadiusM = Math.max(cpa.dcpaNm * 1852, 200);
                        proximityDataSource.entities.add({
                            id: `cpa-zone-${nv.mmsi}`,
                            position: new Cesium.CallbackProperty(() => {
                                const s = shipDataMap[selectedMmsi];
                                const t = shipDataMap[nv.mmsi];
                                if (!s || !t) return Cesium.Cartesian3.fromDegrees(0, 0);
                                const c = computeCpa(s, t);
                                return Cesium.Cartesian3.fromDegrees(c.lng, c.lat);
                            }, false),
                            ellipse: {
                                semiMajorAxis: new Cesium.CallbackProperty(() => {
                                    const s = shipDataMap[selectedMmsi];
                                    const t = shipDataMap[nv.mmsi];
                                    if (!s || !t) return 200;
                                    const c = computeCpa(s, t);
                                    return Math.max(c.dcpaNm * 1852, 200);
                                }, false),
                                semiMinorAxis: new Cesium.CallbackProperty(() => {
                                    const s = shipDataMap[selectedMmsi];
                                    const t = shipDataMap[nv.mmsi];
                                    if (!s || !t) return 200;
                                    const c = computeCpa(s, t);
                                    return Math.max(c.dcpaNm * 1852, 200);
                                }, false),
                                material: new Cesium.ColorMaterialProperty(
                                    new Cesium.CallbackProperty(() => {
                                        const pulse = 0.08 + 0.07 * Math.abs(Math.sin(Date.now() / 800));
                                        return color.cesium.withAlpha(pulse);
                                    }, false)
                                ),
                                outline: true,
                                outlineColor: color.cesium.withAlpha(0.5),
                                outlineWidth: 1
                            }
                        });
                    }
                }
            });
        }

        function renderNearbyPanel(nearbyVessels) {
            const section = document.getElementById('nearbyVesselsSection');
            const list = document.getElementById('nearbyVesselsList');

            if (nearbyVessels.length === 0) {
                section.style.display = 'none';
                return;
            }

            section.style.display = 'block';
            const hasMlMatches = nearbyVessels.some(nv => nv.mlRiskLevel != null && nv.mlRiskLevel > 0);
            const mlIndicator = document.getElementById('nearbyMlIndicator');
            if (mlIndicator) mlIndicator.style.display = hasMlMatches ? 'inline' : 'none';
            list.innerHTML = nearbyVessels.map(nv => {
                const isCollisionTarget = collisionTargetMmsi != null && (nv.mmsi == collisionTargetMmsi);
                const hasMlRisk = nv.mlRiskLevel != null && nv.mlRiskLevel > 0;
                const mlColor = hasMlRisk ? ML_RISK_COLORS[nv.mlRiskLevel] : null;
                const color = hasMlRisk
                    ? { css: mlColor }
                    : isCollisionTarget
                        ? { css: '#f43f5e' }
                        : proximityColor(nv.distance);
                // AI 뱃지: 보라 계열로 구분
                const ML_BADGE_COLORS = { 3: '#a855f7', 2: '#8b5cf6', 1: '#a78bfa' };
                const mlBadgeColor = hasMlRisk ? (ML_BADGE_COLORS[nv.mlRiskLevel] || '#a855f7') : null;

                const hasDistRisk = nv.distSeverity != null;
                const DIST_SEVERITY_COLORS = { danger: '#f43f5e', warning: '#f97316' };
                const distColor = hasDistRisk ? (DIST_SEVERITY_COLORS[nv.distSeverity] || '#f97316') : null;
                const highlight = hasMlRisk
                    ? `background:${mlBadgeColor}15;border:1px solid ${mlBadgeColor}40;border-radius:6px;`
                    : hasDistRisk
                        ? `background:${distColor}15;border:1px solid ${distColor}40;border-radius:6px;`
                        : isCollisionTarget
                            ? 'background:rgba(244,63,94,0.15);border:1px solid rgba(244,63,94,0.3);border-radius:6px;'
                            : '';
                const mlBadge = hasMlRisk
                    ? `<span style="font-size:0.6rem;padding:1px 5px;border-radius:3px;background:${mlBadgeColor}25;color:${mlBadgeColor};font-weight:600;flex-shrink:0;">AI 예측 ${nv.mlRiskLabel}</span>`
                    : '';
                // 거리 기반 뱃지: 기존 빨강/주황 유지
                const DIST_BADGE_LABELS = { '위험': '위험', '경고': '경고' };
                const distBadge = hasDistRisk
                    ? `<span style="font-size:0.6rem;padding:1px 5px;border-radius:3px;background:${distColor}25;color:${distColor};font-weight:600;flex-shrink:0;">거리 기반 접근 ${nv.distRiskLabel}</span>`
                    : '';
                const anyRisk = hasMlRisk || hasDistRisk || isCollisionTarget;
                return `<div class="nearby-row" data-mmsi="${nv.mmsi}" data-lat="${nv.lat}" data-lng="${nv.lng}" style="${highlight}">
                    <span class="nearby-dot" style="background:${color.css}"></span>
                    <span class="nearby-name">${anyRisk ? '⚠ ' : ''}${nv.name}</span>
                    ${mlBadge}${distBadge}
                    <span class="nearby-dist" style="${anyRisk ? `color:${color.css};font-weight:700;` : ''}">${nv.distance.toFixed(1)} nm</span>
                </div>`;
            }).join('');

            // Click handler: fly to vessel
            list.querySelectorAll('.nearby-row').forEach(row => {
                row.addEventListener('click', () => {
                    const lat = parseFloat(row.dataset.lat);
                    const lng = parseFloat(row.dataset.lng);
                    smoothFlyTo({
                        destination: Cesium.Cartesian3.fromDegrees(lng, lat, 50000)
                    });
                });
            });

            // Sync to 2D map
            if (currentMapMode === '2d') {
                setTimeout(() => syncProximityToLeaflet(), 50);
            }
        }

        function clearProximity() {
            selectedProximityMmsi = null;
            collisionTargetMmsi = null;
            proximityMissCount = 0;
            proximityDataSource.entities.removeAll();
            // Clear 2D proximity
            if (currentMapMode === '2d' && leafletMap) {
                Object.values(leafletCollisionLines).forEach(l => leafletMap.removeLayer(l));
                leafletCollisionLines = {};
            }
            const section = document.getElementById('nearbyVesselsSection');
            if (section) section.style.display = 'none';
        }

        let _proximityRunning = false;
        async function updateProximity() {
            if (!selectedProximityMmsi || timeMode !== 'live') {
                clearProximity();
                return;
            }
            if (!latestWsShipsMmsis.has(selectedProximityMmsi)) {
                proximityMissCount++;
                if (proximityMissCount >= 2) {
                    clearProximity();
                }
                return;
            }
            proximityMissCount = 0;
            // 이전 호출이 아직 진행 중이면 스킵 (race condition 방지)
            if (_proximityRunning) return;
            _proximityRunning = true;
            try {
                const mmsi = selectedProximityMmsi;
                const nearby = await findNearbyVessels(mmsi, PROXIMITY_RADIUS_NM, PROXIMITY_MAX_COUNT);
                // async 동안 선택이 바뀌었으면 렌더링 스킵
                if (mmsi !== selectedProximityMmsi) return;
                enrichNearbyWithMlRisk(mmsi, nearby);
                renderProximityLines(mmsi, nearby);
                renderNearbyPanel(nearby);
            } finally {
                _proximityRunning = false;
            }
        }
        // ── End Vessel Proximity Distance ────────────────────────────────────

        function updateShipsLayer(ships) {
            const byType = {};
            SHIP_TYPES.forEach(t => byType[t] = []);

            // Update lookup map with latest data
            ships.forEach(s => { shipDataMap[s.mmsi] = s; });

            ships.forEach(ship => {
                const type = ship.type || 'other';
                if (byType[type]) byType[type].push(ship);
                else byType['other'].push(ship);
            });

            // Get current camera bounding box (Viewport Culling)
            // Default to full world bounds in DEGREES
            let west = -180;
            let east = 180;
            let south = -90;
            let north = 90;

            // In HISTORY mode, skip viewport culling to show all ships
            // In LIVE mode, apply viewport culling for performance
            if (timeMode === 'live') {
                if (currentMapMode === '2d' && leafletMap) {
                    const bounds = leafletMap.getBounds();
                    const buffer = 0.5;
                    west = bounds.getWest() - buffer;
                    east = bounds.getEast() + buffer;
                    south = bounds.getSouth() - buffer;
                    north = bounds.getNorth() + buffer;
                } else {
                    const cameraRect = viewer.camera.computeViewRectangle();
                    if (cameraRect) {
                        const buffer = 0.5;
                        west = Cesium.Math.toDegrees(cameraRect.west) - buffer;
                        east = Cesium.Math.toDegrees(cameraRect.east) + buffer;
                        south = Cesium.Math.toDegrees(cameraRect.south) - buffer;
                        north = Cesium.Math.toDegrees(cameraRect.north) + buffer;
                    }
                }
            }

            // Limit the max number of ships we show at once per type
            // HISTORY mode: higher limit since we want to see all historical data
            // LIVE mode: lower limit for real-time performance
            const MAX_SHIPS_PER_TYPE = (timeMode === 'history') ? 2000 : 400;
            let totalRendered = 0;

            SHIP_TYPES.forEach(type => {
                const ds = shipDataSources[type];
                if (!ds) return;

                const typeShips = byType[type];
                const existingIds = new Set();
                let typeRenderedCount = 0;

                typeShips.forEach(ship => {
                    // Culling: Check if ship is within camera bounds
                    if (typeRenderedCount >= MAX_SHIPS_PER_TYPE) return;
                    if (ship.lng < west || ship.lng > east || ship.lat < south || ship.lat > north) return;

                    typeRenderedCount++;
                    totalRendered++;
                    existingIds.add(ship.mmsi);
                    let entity = ds.entities.getById(ship.mmsi);
                    const position = Cesium.Cartesian3.fromDegrees(ship.lng, ship.lat);

                    if (!entity) {
                        const mmsiKey = ship.mmsi;
                        // Description reads from shipDataMap so it always reflects latest data
                        const desc = new Cesium.CallbackProperty(() => {
                            const s = shipDataMap[mmsiKey] || ship;
                            let rows = `
                                    <tr><th>Name</th><td>${s.name}</td></tr>
                                    <tr><th>MMSI</th><td>${s.mmsi}</td></tr>
                                    <tr><th>Type</th><td>${s.type}</td></tr>
                                    <tr><th>Country</th><td>${s.country || 'UNKNOWN'}</td></tr>
                                    <tr><th>SOG</th><td>${s.sog || 0} kts</td></tr>
                                    <tr><th>COG</th><td>${s.cog || 0}°</td></tr>
                                    <tr><th>Heading</th><td>${s.heading || 0}°</td></tr>`;
                            if (s.length) rows += `<tr><th>Length</th><td>${s.length} m</td></tr>`;
                            if (s.beam) rows += `<tr><th>Beam</th><td>${s.beam} m</td></tr>`;
                            if (s.draught) rows += `<tr><th>Draught</th><td>${s.draught} m</td></tr>`;
                            if (s.destination && s.destination !== 'UNKNOWN') rows += `<tr><th>Destination</th><td>${s.destination}</td></tr>`;
                            if (s.eta) rows += `<tr><th>ETA</th><td>${s.eta}</td></tr>`;
                            if (s.callsign) rows += `<tr><th>Callsign</th><td>${s.callsign}</td></tr>`;
                            if (s.imo) rows += `<tr><th>IMO</th><td>${s.imo}</td></tr>`;
                            return `<table class="cesium-infoBox-defaultTable"><tbody>${rows}</tbody></table>`;
                        }, false);

                        const shipSize = getShipSize(ship.length, ship.beam);
                        ds.entities.add({
                            id: ship.mmsi,
                            name: ship.name,
                            description: desc,
                            position: position,
                            billboard: {
                                image: getShipIcon(SHIP_COLORS[type], type),
                                width: shipSize.width,
                                height: shipSize.height,
                                scaleByDistance: new Cesium.NearFarScalar(5e5, 1.6, 1.5e7, 0.6),
                                disableDepthTestDistance: Number.POSITIVE_INFINITY,
                                rotation: new Cesium.CallbackProperty(() => {
                                    const s = shipDataMap[mmsiKey] || ship;
                                    return Cesium.Math.toRadians(-(s.heading || 0));
                                }, false)
                            },
                            label: {
                                text: ship.name || '',
                                font: '11px Inter, sans-serif',
                                fillColor: Cesium.Color.fromCssColorString(SHIP_COLORS[type] || '#6b7280'),
                                outlineColor: Cesium.Color.BLACK,
                                outlineWidth: 3,
                                style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                                pixelOffset: new Cesium.Cartesian2(0, -18),
                                scaleByDistance: new Cesium.NearFarScalar(5e5, 1.0, 5e6, 0.4),
                                distanceDisplayCondition: new Cesium.DistanceDisplayCondition(0, 3e6),
                                disableDepthTestDistance: Number.POSITIVE_INFINITY
                            }
                        });
                    } else {
                        // Directly update position
                        entity.position = position;
                    }
                });

                ds.entities.values.forEach(entity => {
                    // Only remove ships that are no longer in our WebSocket update 
                    // (existingIds contains ALL ships in this type from the WebSocket payload, regardless of culling)
                    let stillExists = false;
                    for (let i = 0; i < typeShips.length; i++) {
                        if (typeShips[i].mmsi === entity.id) {
                            stillExists = true;
                            // Update visibility based on culling bounds
                            const ship = typeShips[i];
                            const inBounds = (ship.lng >= west && ship.lng <= east && ship.lat >= south && ship.lat <= north);
                            entity.show = inBounds;
                            break;
                        }
                    }
                    if (!stillExists) {
                        ds.entities.remove(entity);
                    }
                });

                const countEl = document.getElementById(`count-${type}`);
                if (countEl) countEl.textContent = typeShips.length.toLocaleString();
            });

            // 2D 모드 Leaflet 마커 갱신
            if (currentMapMode === '2d' && leafletMap) {
                ships.forEach(ship => {
                    if (leafletShipMarkers[ship.mmsi]) {
                        leafletShipMarkers[ship.mmsi].setLatLng([ship.lat, ship.lng]);
                    } else {
                        const type = ship.type || 'other';
                        const color = SHIP_COLORS[type] || '#6b7280';
                        const marker = L.circleMarker([ship.lat, ship.lng], {
                            radius: 4,
                            fillColor: color,
                            fillOpacity: 0.9,
                            color: color,
                            weight: 1,
                            opacity: 0.7
                        }).addTo(leafletMap);

                        marker.bindTooltip(ship.name || 'Unknown', {
                            className: 'ship-tooltip-2d',
                            direction: 'top',
                            offset: [0, -6]
                        });

                        marker.on('click', () => {
                            const ds = shipDataSources[type];
                            const entity = ds ? ds.entities.getById(ship.mmsi) : null;
                            if (entity) showShipInfo(entity);
                            selectedProximityMmsi = ship.mmsi;
                            updateProximity();
                        });

                        leafletShipMarkers[ship.mmsi] = marker;
                    }
                });

                // 삭제된 선박 마커 제거
                const currentMmsis = new Set(ships.map(s => String(s.mmsi)));
                Object.keys(leafletShipMarkers).forEach(mmsi => {
                    if (!currentMmsis.has(String(mmsi))) {
                        leafletMap.removeLayer(leafletShipMarkers[mmsi]);
                        delete leafletShipMarkers[mmsi];
                    }
                });
            }

        }

        let ws;
        function initWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            // Use window.location.host instead of default ws:// so it works in both dev (localhost) and prod
            const wsUrl = `${protocol}//${window.location.host}/api/v1/ws/ships`;

            console.log("Connecting to WebSocket:", wsUrl);
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                console.log("WebSocket connected!");
                const loadingEl = document.getElementById('loading');
                if (loadingEl && loadingEl.innerHTML.includes('초기화')) {
                    loadingEl.style.display = 'none';
                }
            };

            ws.onmessage = (event) => {
                // Only process WebSocket updates in LIVE mode
                if (timeMode !== 'live') return;

                try {
                    const data = JSON.parse(event.data);
                    if (data.type === "ships_update") {
                        updateShipsLayer(data.ships || []);

                        // Track which MMSIs are in the latest payload (for proximity staleness check)
                        latestWsShipsMmsis = new Set((data.ships || []).map(s => s.mmsi));

                        // Throttled proximity update
                        if (selectedProximityMmsi) {
                            const now = Date.now();
                            if (now - lastProximityUpdate >= PROXIMITY_THROTTLE_MS) {
                                lastProximityUpdate = now;
                                updateProximity();
                            }
                        }

                        document.getElementById('total-ships').textContent = (data.total_tracked || data.ship_count || 0).toLocaleString();
                        document.getElementById('stat-assets').textContent = data.total_tracked || data.ship_count || 0;

                        if (data.timestamp) {
                            const updated = new Date(data.timestamp);
                            document.getElementById('last-update').textContent = updated.toISOString().substring(11, 19);
                        }
                    }
                } catch (error) {
                    console.error("Error parsing WebSocket message:", error);
                }
            };

            ws.onerror = (error) => {
                console.error("WebSocket error:", error);
            };

            ws.onclose = () => {
                console.log("WebSocket closed. Reconnecting in 5 seconds...");
                if (currentMapMode === '2d' && leafletMap) {
                    Object.values(leafletShipMarkers).forEach(m => m.setStyle({ opacity: 0.3, fillOpacity: 0.3 }));
                }
                setTimeout(initWebSocket, 5000);
            };
        }

        // ── Collision Analysis Panel (global scope) ──────────────────
        let collisionData = { distance: { risks: [] }, ml: { risks: [] } };
        let collisionActiveTab = 'distance';
        let mlRiskFilter = null; // null = 2+3 (default), 1/2/3 = specific level

        function switchCollisionTab(tab) {
            collisionActiveTab = tab;
            document.querySelectorAll('.collision-tab-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.tab === tab);
            });
            renderCollisionList();
        }

        // Bind collision tab buttons
        document.getElementById('collisionTabDistance').addEventListener('click', () => switchCollisionTab('distance'));
        document.getElementById('collisionTabMl').addEventListener('click', () => switchCollisionTab('ml'));

        function collisionSeverityBadge(severity) {
            const colors = { danger: '#f43f5e', warning: '#eab308' };
            const labels = { danger: 'DANGER', warning: 'WARNING' };
            const bg = severity === 'danger' ? 'rgba(244,63,94,0.2)' : 'rgba(234,179,8,0.2)';
            return `<span class="collision-badge" style="background:${bg};color:${colors[severity]}">${labels[severity]}</span>`;
        }

        function mlRiskBadge(level, label) {
            const colors = { 0: '#10b981', 1: '#eab308', 2: '#f97316', 3: '#f43f5e' };
            const bgs = { 0: 'rgba(16,185,129,0.2)', 1: 'rgba(234,179,8,0.2)', 2: 'rgba(249,115,22,0.2)', 3: 'rgba(244,63,94,0.2)' };
            return `<span class="collision-badge" style="background:${bgs[level]};color:${colors[level]}">${level} — ${label}</span>`;
        }

        function _renderCollisionTicker(list, cardsHtml, count) {
            list.innerHTML = cardsHtml;
            // 자동 한 칸씩 넘기기 (5초 간격)
            _startCollisionAutoScroll(list);
        }

        let _collisionScrollTimer = null;
        let _collisionScrollPaused = false;
        function _startCollisionAutoScroll(list) {
            if (_collisionScrollTimer) clearInterval(_collisionScrollTimer);
            // 마우스 올리면 멈춤
            list.onmouseenter = () => { _collisionScrollPaused = true; };
            list.onmouseleave = () => { _collisionScrollPaused = false; };
            _collisionScrollTimer = setInterval(() => {
                if (_collisionScrollPaused) return;
                const cards = list.querySelectorAll('.collision-card');
                if (cards.length <= 1) return;
                // 다음 카드 위치로 세로 스크롤, 끝에 도달하면 처음으로
                const nextTop = list.scrollTop + 120;
                if (nextTop >= list.scrollHeight - list.clientHeight - 10) {
                    list.scrollTo({ top: 0, behavior: 'smooth' });
                } else {
                    list.scrollBy({ top: 120, behavior: 'smooth' });
                }
            }, 5000);
        }

        function renderCollisionList() {
            const list = document.getElementById('collisionList');
            const fixedSummary = document.getElementById('mlRiskSummaryFixed');
            const data = collisionActiveTab === 'distance' ? collisionData.distance : collisionData.ml;
            const risks = data.risks || [];

            // Update drawer summary bar (visible when collapsed)
            const summaryStats = document.getElementById('drawerSummaryStats');
            const summaryCount = document.getElementById('collision-count-summary');
            if (summaryStats && summaryCount) {
                summaryCount.textContent = risks.length;
                if (collisionActiveTab === 'ml') {
                    const countByLevel = { 1: 0, 2: 0, 3: 0 };
                    risks.forEach(r => { if (countByLevel[r.risk_level] !== undefined) countByLevel[r.risk_level]++; });
                    summaryStats.innerHTML =
                        `<span class="s-danger">위험 ${countByLevel[3]}</span>` +
                        `<span class="s-warn">경고 ${countByLevel[2]}</span>` +
                        `<span class="s-caution">주의 ${countByLevel[1]}</span>`;
                } else {
                    const highCount = risks.filter(r => r.severity === 'high' || r.severity === 'danger').length;
                    const medCount = risks.filter(r => r.severity === 'medium' || r.severity === 'warning').length;
                    const lowCount = risks.length - highCount - medCount;
                    summaryStats.innerHTML =
                        `<span class="s-danger">고위험 ${highCount}</span>` +
                        `<span class="s-warn">경고 ${medCount}</span>` +
                        `<span class="s-caution">주의 ${lowCount}</span>`;
                }
            }

            // 탭 전환 시 고정 요약 바 숨기기/보이기
            if (collisionActiveTab !== 'ml') {
                fixedSummary.style.display = 'none';
                fixedSummary.innerHTML = '';
            }

            if (risks.length === 0) {
                list.innerHTML = '<div class="collision-empty">충돌 위험 없음</div>';
                return;
            }

            function tcpaClass(t) { return t < 5 ? 'danger' : t < 10 ? 'warn' : ''; }
            function dcpaClass(d) { return d < 0.5 ? 'danger' : d < 1.0 ? 'warn' : ''; }
            function distClass(d) { return d < 1.0 ? 'danger' : d < 2.0 ? 'warn' : ''; }

            if (collisionActiveTab === 'distance') {
                // Distance: ticker cards
                const cardsHtml = risks.map(r => `
                    <div class="collision-card"
                         data-mmsi-a="${r.ship_a.mmsi}" data-mmsi-b="${r.ship_b.mmsi}"
                         data-lat-a="${r.ship_a.lat}" data-lng-a="${r.ship_a.lng}" data-lat-b="${r.ship_b.lat}" data-lng-b="${r.ship_b.lng}">
                        <div class="pair-header">
                            ${r.ship_a.name} <span style="color:var(--accent);">↔</span> ${r.ship_b.name}
                            ${collisionSeverityBadge(r.severity)}
                        </div>
                        <div class="pair-detail">
                            TCPA: ${r.tcpa_min}min · DCPA: ${r.dcpa_nm}nm · DIST: ${r.current_dist_nm}nm
                        </div>
                    </div>
                `).join('');
                _renderCollisionTicker(list, cardsHtml, risks.length);
            } else {
                // ML Model: 요약 바를 고정 컨테이너에, 카드만 스크롤 리스트에
                const countByLevel = { 1: 0, 2: 0, 3: 0 };
                risks.forEach(r => { if (countByLevel[r.risk_level] !== undefined) countByLevel[r.risk_level]++; });

                const isActive = (lvl) => mlRiskFilter === lvl ? 'active' : '';
                const isDefaultActive = mlRiskFilter === null ? 'active' : '';

                // 고정 요약 바 렌더링
                fixedSummary.style.display = 'block';
                fixedSummary.innerHTML = `
                    <div style="display:flex;align-items:center;gap:6px;padding:4px 8px;margin-bottom:4px;">
                        <i class="fa-solid fa-brain" style="color:var(--accent);font-size:0.65rem;"></i>
                        <span style="font-size:0.6rem;color:var(--text-dim);font-family:'JetBrains Mono',monospace;">XGBoost · 14 features · 10s 주기</span>
                    </div>
                    <div class="ml-risk-summary">
                        <div class="risk-stat ${isActive(3)}" data-risk-filter="3" style="--stat-color: #f43f5e; --stat-bg: rgba(244,63,94,0.15);">
                            <span class="risk-stat-count">${countByLevel[3]}</span>
                            <span class="risk-stat-label">위험</span>
                        </div>
                        <div class="risk-stat ${isActive(2)}" data-risk-filter="2" style="--stat-color: #f97316; --stat-bg: rgba(249,115,22,0.15);">
                            <span class="risk-stat-count">${countByLevel[2]}</span>
                            <span class="risk-stat-label">경고</span>
                        </div>
                        <div class="risk-stat ${isActive(1)}" data-risk-filter="1" style="--stat-color: #eab308; --stat-bg: rgba(234,179,8,0.15);">
                            <span class="risk-stat-count">${countByLevel[1]}</span>
                            <span class="risk-stat-label">주의</span>
                        </div>
                        <div class="risk-stat ${isDefaultActive}" data-risk-filter="all" style="--stat-color: var(--text-muted); --stat-bg: rgba(255,255,255,0.05);">
                            <span class="risk-stat-count">${risks.length}</span>
                            <span class="risk-stat-label">전체</span>
                        </div>
                    </div>`;

                // 요약 바 클릭 → 필터 전환
                fixedSummary.querySelectorAll('.risk-stat[data-risk-filter]').forEach(stat => {
                    stat.addEventListener('click', () => {
                        const val = stat.dataset.riskFilter;
                        if (val === 'all') {
                            mlRiskFilter = null;
                        } else {
                            const lvl = parseInt(val);
                            mlRiskFilter = mlRiskFilter === lvl ? null : lvl;
                        }
                        renderCollisionList();
                    });
                });

                // 필터 적용: null(기본)=2+3, 숫자=해당 레벨만
                const filtered = mlRiskFilter === null
                    ? risks.filter(r => r.risk_level >= 2)
                    : risks.filter(r => r.risk_level === mlRiskFilter);

                if (filtered.length === 0) {
                    list.innerHTML = '<div class="collision-empty">해당 등급의 위험이 없습니다</div>';
                } else {
                    const mlCardsHtml = filtered.map(r => `
                        <div class="collision-card"
                             data-mmsi-a="${r.ship_a.mmsi}" data-mmsi-b="${r.ship_b.mmsi}"
                             data-lat-a="${r.ship_a.lat}" data-lng-a="${r.ship_a.lng}" data-lat-b="${r.ship_b.lat}" data-lng-b="${r.ship_b.lng}"

                            <div class="ship-row">
                                <span class="role-tag ts">TS</span>
                                <span class="ship-name">${r.ship_b.name}</span>
                                <span class="ship-meta">${r.ship_b.sog}kts ${r.ship_b.cog}°</span>

                                <div class="metric">

                                    <span class="metric-value ${tcpaClass(r.tcpa_min)}">${r.tcpa_min}m</span>

                                <div class="metric">
                                    <span class="metric-label">DCPA</span>
                                    <span class="metric-value ${dcpaClass(r.dcpa_nm)}">${r.dcpa_nm}nm</span>

                    _renderCollisionTicker(list, mlCardsHtml, filtered.length);

            _bindCollisionCardClicks(list);

        function _bindCollisionCardClicks(list) {
            list.querySelectorAll('.collision-card').forEach(card => {
                card.addEventListener('click', () => {
                    const latA = parseFloat(card.dataset.latA);
                    const lngA = parseFloat(card.dataset.lngA);
                    const latB = parseFloat(card.dataset.latB);
                    const lngB = parseFloat(card.dataset.lngB);
                    const midLat = (latA + latB) / 2;
                    const midLng = (lngA + lngB) / 2;
                    smoothFlyTo({
                        destination: Cesium.Cartesian3.fromDegrees(midLng, midLat, 5000)
                    });

                    const mmsiA = Number(card.dataset.mmsiA);
                    const mmsiB = Number(card.dataset.mmsiB);

                    if (collisionActiveTab === 'ml') {
                        // ML 탭: 해당 쌍만 선 1개 표시
                        selectedProximityMmsi = null;
                        collisionTargetMmsi = null;
                        const distNm = haversineNm(latA, lngA, latB, lngB);
                        const riskLevel = parseInt(card.dataset.riskLevel) || 1;
                        renderProximityLines(mmsiA, [{
                            mmsi: mmsiB,
                            lat: latB,
                            lng: lngB,
                            distance: distNm,
                            mlRiskLevel: riskLevel
                        }]);
                        renderNearbyPanel([]);
                    } else {
                        // 거리기반: 주변 선박 전체 표시
                        collisionTargetMmsi = mmsiB;
                        selectedProximityMmsi = mmsiA;
                        proximityMissCount = 0;
                        updateProximity();

                    // Show ship info panel
                    for (const type in shipDataSources) {
                        const entity = shipDataSources[type].entities.getById(mmsiA)

        async function fetchCollisionRisks() {
            try {
                const resp = await fetch('/api/v1/collision/risks');
                if (!resp.ok) return;
                collisionData = await resp.json();
                renderCollisionList();

                // Update header badge (ML: count only level 2+3)
                const mlSerious = (collisionData.ml?.risks || []).filter(r => r.risk_level >= 2).length;
                const total = (collisionData.distance?.total || 0) + mlSerious;
                const badge = document.getElementById('collision-count');

                console.warn('Collision fetch failed:', e);

        // ── End Collision globals ────────────────────────────────────

        async function fetchData() {
            document.getElementById('loading').style.display = 'flex';
            try {
                const restrictedAreas = await Cesium.GeoJsonDataSource.load('/api/v1/restricted-areas', {
                    stroke: Cesium.Color.RED,
                    fill: Cesium.Color.RED.withAlpha(0.3),
                    strokeWidth: 3
                });
                await viewer.dataSources.add(restrictedAreas);

                const eventsResponse = await fetch('/api/v1/events');
                const eventsJson = await eventsResponse.json();
                const features = eventsJson.features || [];
                document.getElementById('stat-events').textContent = features.length;

                // Events are shown on map as markers (no feed cards — feed is now AIS alerts only)
                const eventsSrc = await Cesium.GeoJsonDataSource.load(eventsJson, {
                    markerSymbol: 'cross',
                    markerColor: Cesium.Color.fromCssColorString('#38bdf8'),
                    markerSize: 40
                });
                await viewer.dataSources.add(eventsSrc);


                // ---------------------------------------------------------------
                // Live Feed — AIS Anomaly Alert Polling
                // Polls /api/v1/alerts every 30s and prepends new cards to feedPanel
                // ---------------------------------------------------------------
                const seenAlertIds = new Set();

                function alertIcon(type) {
                    if (type === 'speeding') return { icon: 'fa-gauge-high', color: '#ef4444', label: 'SPEEDING' };
                    if (type === 'signal_lost') return { icon: 'fa-satellite-dish', color: '#f97316', label: 'SIGNAL LOST' };
                    if (type === 'dest_change') return { icon: 'fa-right-left', color: '#a78bfa', label: 'DEST CHANGE' };
                    return { icon: 'fa-triangle-exclamation', color: '#facc15', label: 'ALERT' };
                }

                function _rebuildFeedTicker(container) {
                    const items = window._feedAlerts || [];
                    if (items.length === 0) return;

                    const cardsHtml = items.map(({ alert, icon, color, label, timeStr, borderColor }) => `
                        <div class="feed-card" style="border-left: 3px solid ${borderColor}; cursor: pointer;"
                             data-lat="${alert.lat || ''}" data-lng="${alert.lng || ''}" data-mmsi="${alert.mmsi || ''}">
                            <div class="feed-meta" style="display:flex;justify-content:space-between;align-items:center;">
                                <span style="color:${color};font-weight:700;font-size:0.7rem;letter-spacing:0.08em;">
                                    <i class="fa-solid ${icon}" style="margin-right:5px;"></i>${label}
                                </span>
                                <span style="color:var(--text-dim);font-size:0.7rem;"><i class="fa-solid fa-clock" style="margin-right:3px;"></i>${timeStr}</span>
                            </div>
                            <h3 class="feed-title" style="margin:6px 0 4px;font-size:0.85rem;">${alert.name || 'UNKNOWN VESSEL'}</h3>
                            <div style="color:var(--text-dim);font-size:0.75rem;line-height:1.5;">
                                ${alert.message || ''}
                                ${alert.country ? `<span style="margin-left:6px;opacity:0.7;">🏴 ${alert.country}</span>` : ''}
                            </div>
                        </div>
                    `).join('');

                    // 카드 3개 이하면 정적, 4개 이상이면 세로 티커 (복제해서 무한 루프)
                    if (items.length <= 3) {
                        container.innerHTML = cardsHtml;
                    } else {
                        const dur = Math.max(20, items.length * 4);
                        container.innerHTML = `<div class="feed-ticker-wrap" style="--feed-ticker-duration: ${dur}s;">${cardsHtml}${cardsHtml}</div>`;
                    }

                    // Bind click → fly to ship
                    container.querySelectorAll('.feed-card[data-lat]').forEach(card => {
                        const lat = parseFloat(card.dataset.lat);
                        const lng = parseFloat(card.dataset.lng);
                        const mmsi = card.dataset.mmsi;
                        if (!lat || !lng) return;
                        card.addEventListener('click', () => {
                            smoothFlyTo({
                                destination: Cesium.Cartesian3.fromDegrees(lng, lat, 5000.0),
                                complete: () => {
                                    setTimeout(() => {
                                        for (const type in shipDataSources) {
                                            const ds = shipDataSources[type];
                                            const entity = ds.entities.getById(mmsi) || ds.entities.getById(String(mmsi)) || ds.entities.getById(Number(mmsi));
                                            if (entity) { viewer.selectedEntity = entity; showShipInfo(entity); break; }
                                        }
                                    }, 500);
                                }
                            });
                        });
                    });
                }

                async function fetchAndRenderAlerts() {
                    try {
                        const resp = await fetch('/api/v1/alerts?limit=50');
                        if (!resp.ok) return;
                        const alerts = await resp.json();
                        if (!alerts || alerts.length === 0) return;

                        const feedContainer = document.getElementById('eventFeed');

                        // Remove placeholder if present
                        const placeholder = feedContainer.querySelector('div[style]:not(.feed-ticker-wrap)');
                        if (placeholder) placeholder.remove();

                        let newCount = 0;
                        // Collect new alerts
                        for (const alert of alerts) {
                            if (seenAlertIds.has(alert.id)) continue;
                            seenAlertIds.add(alert.id);
                            newCount++;

                            const { icon, color, label } = alertIcon(alert.type);
                            const timeStr = new Date(alert.ts).toISOString().substring(11, 19) + 'Z';
                            const severity = alert.severity || 'medium';
                            const borderColor = severity === 'high' ? '#ef4444' : severity === 'medium' ? '#f97316' : '#a78bfa';

                            // Store alert data for ticker rebuild
                            if (!window._feedAlerts) window._feedAlerts = [];
                            window._feedAlerts.unshift({ alert, icon, color, label, timeStr, borderColor });
                        }

                        // Cap stored alerts
                        if (window._feedAlerts && window._feedAlerts.length > 50) {
                            window._feedAlerts = window._feedAlerts.slice(0, 50);
                        }

                        // Rebuild ticker if new alerts arrived
                        if (newCount > 0 && window._feedAlerts && window._feedAlerts.length > 0) {
                            _rebuildFeedTicker(feedContainer);
                        }
                    } catch (e) {
                        console.warn('Alert fetch failed:', e);
                    }
                }

                // Initial fetch + polling every 30s
                fetchAndRenderAlerts();
                setInterval(fetchAndRenderAlerts, 30000);

                // ── Collision Analysis Panel (init polling) ──
                fetchCollisionRisks();
                setInterval(fetchCollisionRisks, 10000);
                // ── End Collision Analysis Panel ──────────────────────────

                // Restore websocket for real-time data
                initWebSocket();

            } catch (error) {
                console.error("Error fetching map data:", error);
                document.getElementById('loading').innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> SYSTEM ERROR';
            } finally {
                if (document.getElementById('loading').innerHTML.includes('초기화')) {
                    document.getElementById('loading').style.display = 'none';
                }
            }
        }

        fetchData();

        // ── Sentinel-2 Right-click Imagery Search ─────────────────────────────
        document.body.insertAdjacentHTML('beforeend', `
            
            <div id="sentinelMenu" style="
                display:none; position:fixed; z-index:9999;
                background:rgba(10,14,27,0.96); border:1px solid rgba(99,102,241,0.4);
                border-radius:8px; padding:6px 0; min-width:210px;
                backdrop-filter:blur(12px); box-shadow:0 8px 32px rgba(0,0,0,0.6);
                font-family:'JetBrains Mono',monospace;">
                <div id="sentinelMenuBtn" style="
                    padding:10px 16px; cursor:pointer; color:#a5b4fc; font-size:0.78rem;
                    display:flex; align-items:center; gap:8px;"
                    onmouseover="this.style.background='rgba(99,102,241,0.15)'"
                    onmouseout="this.style.background='transparent'">
                    <i class="fa-solid fa-satellite-dish"></i>&nbsp;위성 영상 검색 (Sentinel-2)
                </div>
                <div style="padding:4px 16px 8px; color:rgba(165,180,252,0.45); font-size:0.68rem;">
                    <span id="sentinelMenuCoords">--</span>
                </div>
            </div>

            <div id="sentinelCard" class="drag-panel">
                <div id="sentinelCardHeader" class="drag-panel-header">
                    <span class="title">
                        <i class="fa-solid fa-satellite-dish"></i>&nbsp; SENTINEL-2 IMAGERY
                    </span>
                    <button class="close-btn" onclick="document.getElementById('sentinelCard').classList.remove('visible')">&#x2715;</button>
                </div>
                <div id="sentinelCardBody" class="drag-panel-body"></div>
            </div>
        `);

        let _sentinelLat = null, _sentinelLng = null;

        viewer.cesiumWidget.canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            const cart = viewer.camera.pickEllipsoid(
                new Cesium.Cartesian2(e.offsetX, e.offsetY),
                viewer.scene.globe.ellipsoid
            );
            if (!cart) return;
            const carto = Cesium.Cartographic.fromCartesian(cart);
            _sentinelLat = +(Cesium.Math.toDegrees(carto.latitude).toFixed(4));
            _sentinelLng = +(Cesium.Math.toDegrees(carto.longitude).toFixed(4));
            const menu = document.getElementById('sentinelMenu');
            document.getElementById('sentinelMenuCoords').textContent = _sentinelLat + '\u00b0, ' + _sentinelLng + '\u00b0';
            menu.style.display = 'block';
            menu.style.left = Math.min(e.clientX, window.innerWidth - 230) + 'px';
            menu.style.top = Math.min(e.clientY, window.innerHeight - 100) + 'px';
        });

        document.addEventListener('click', () => {
            document.getElementById('sentinelMenu').style.display = 'none';
        });

        document.getElementById('sentinelMenuBtn').addEventListener('click', async (e) => {
            e.stopPropagation();
            document.getElementById('sentinelMenu').style.display = 'none';
            const card = document.getElementById('sentinelCard');
            const body = document.getElementById('sentinelCardBody');

            // Position: 화면 중앙 약간 위
            card.style.top = Math.max(100, (window.innerHeight - 400) / 2) + 'px';
            card.style.left = Math.max(20, (window.innerWidth - 260) / 2) + 'px';
            card.style.right = 'auto';

            // Slide in
            card.classList.add('visible');
            body.innerHTML = '<div style="text-align:center;color:#6b7280;font-family:\'JetBrains Mono\',monospace;font-size:0.75rem;padding:30px 0;"><i class="fa-solid fa-circle-notch fa-spin"></i>&nbsp;Searching Sentinel-2...</div>';

            try {
                const res = await fetch('/api/v1/sentinel?lat=' + _sentinelLat + '&lng=' + _sentinelLng);
                const data = await res.json();

                if (!data.found) {
                    body.innerHTML = '<div style="text-align:center;color:#ef4444;font-size:0.75rem;padding:30px;">' + (data.message || data.error || 'No result') + '</div>';
                    return;
                }

                const dt = data.datetime ? new Date(data.datetime).toLocaleDateString('ko-KR') : '-';
                const cc = data.cloud_cover !== null ? data.cloud_cover + '%' : '-';
                const ccColor = parseFloat(data.cloud_cover) < 15 ? '#10b981' : parseFloat(data.cloud_cover) < 30 ? '#eab308' : '#ef4444';
                const href = data.fullres_url ? 'href="' + data.fullres_url + '" target="_blank"' : '';

                body.innerHTML =
                    (data.thumbnail_url ? '<a ' + href + '><img src="' + data.thumbnail_url + '" style="width:100%;border-radius:8px;border:1px solid var(--panel-border);display:block;margin-bottom:14px;"></a>' : '') +
                    '<table>' +
                    '<tr><th>촬영일</th><td>' + dt + '</td></tr>' +
                    '<tr><th>구름량</th><td style="color:' + ccColor + ';">' + cc + '</td></tr>' +
                    '<tr><th>플랫폼</th><td>' + (data.platform || 'Sentinel-2') + '</td></tr>' +
                    '<tr><th>좌표</th><td>' + _sentinelLat + '\u00b0, ' + _sentinelLng + '\u00b0</td></tr>' +
                    '</table>' +
                    (href ? '<a ' + href + ' style="display:block;margin-top:16px;text-align:center;color:var(--accent);font-family:\'Inter\',sans-serif;font-size:0.8rem;text-decoration:none;border:1px solid var(--panel-border);border-radius:6px;padding:10px;background:rgba(20,184,166,0.06);transition:background 0.2s;" onmouseover="this.style.background=\'rgba(20,184,166,0.12)\'" onmouseout="this.style.background=\'rgba(20,184,166,0.06)\'"><i class="fa-solid fa-expand"></i> 전체 화질로 뷰어 열기</a>' : '');
            } catch (err) {
                body.innerHTML = '<div style="text-align:center;color:#ef4444;font-size:0.75rem;padding:20px;">Error: ' + err.message + '</div>';
            }
        });
        // ── End Sentinel-2 ────────────────────────────────────────────────────

        // ── Draggable Panels ──────────────────────────────────────────────────
        function makeDraggable(panel, handle) {
            let isDragging = false, startX, startY, startLeft, startTop;

            handle.addEventListener('mousedown', (e) => {
                if (e.target.tagName === 'BUTTON') return; // Don't drag on close button
                isDragging = true;
                const rect = panel.getBoundingClientRect();
                startX = e.clientX;
                startY = e.clientY;
                startLeft = rect.left;
                startTop = rect.top;
                handle.style.cursor = 'grabbing';
                e.preventDefault();
            });

            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const dx = e.clientX - startX;
                const dy = e.clientY - startY;
                panel.style.left = (startLeft + dx) + 'px';
                panel.style.top = (startTop + dy) + 'px';
                panel.style.right = 'auto';
                panel.style.bottom = 'auto';
            });

            document.addEventListener('mouseup', () => {
                if (!isDragging) return;
                isDragging = false;
                handle.style.cursor = 'grab';
            });
        }

        // Make Sentinel-2 card draggable
        makeDraggable(
            document.getElementById('sentinelCard'),
            document.getElementById('sentinelCardHeader')
        );

        // Make Ship Info panel draggable
        makeDraggable(
            document.getElementById('shipInfoPanel'),
            document.getElementById('shipInfoHeader')
        );


        // Close button
        document.getElementById('shipInfoClose').addEventListener('click', () => {
            document.getElementById('shipInfoPanel').classList.remove('visible');
            clearProximity();
        });

        // Show custom ship info panel when entity is clicked
        function showShipInfo(entity) {
            const panel = document.getElementById('shipInfoPanel');
            const title = document.getElementById('shipInfoTitle');
            const body = document.getElementById('shipInfoBody');

            const name = entity.name || 'UNKNOWN';
            title.textContent = name;

            // Get description HTML from CallbackProperty or string
            let descHtml = '';
            if (entity.description) {
                if (entity.description.getValue) {
                    descHtml = entity.description.getValue(viewer.clock.currentTime);
                } else {
                    descHtml = entity.description;
                }
            }

            body.innerHTML = descHtml || '<p style="color:var(--text-dim);font-size:0.8rem;">No details available</p>';
            panel.classList.add('visible');
        }

        // ── Satellite Footprint: 클릭 시 토글 ────────────────────────────
        let _activeFootprintSatId = null;

        function _getSatRealTimePosition(satId) {
            const cache = _satRecCache[satId];
            if (!cache) return null;
            const { satrec, sat } = cache;
            if (typeof satellite !== 'undefined' && satrec) {
                try {
                    const now = new Date();
                    const posVel = satellite.propagate(satrec, now);
                    if (posVel.position) {
                        const gmst = satellite.gstime(now);
                        const geo = satellite.eciToGeodetic(posVel.position, gmst);
                        return {
                            lat: satellite.degreesLat(geo.latitude),
                            lng: satellite.degreesLong(geo.longitude),
                            altKm: geo.height
                        };
                    }
                } catch (e) { /* fallback below */ }
            }
            return { lat: sat.lat, lng: sat.lng, altKm: sat.alt_km || 400 };
        }

        function _toggleSatFootprint(satId) {
            // 기존 footprint 제거
            if (_activeFootprintSatId) {
                const old = satDataSource.entities.getById('footprint-' + _activeFootprintSatId);
                if (old) satDataSource.entities.remove(old);
            }

            // 같은 위성 다시 클릭 → 끄기
            if (_activeFootprintSatId === satId) {
                _activeFootprintSatId = null;
                return;
            }

            // 실시간 위치로 footprint 생성
            const cache = _satRecCache[satId];
            if (!cache) return;
            const color = SAT_COLORS[cache.sat.mission] || '#94a3b8';
            const pos = _getSatRealTimePosition(satId);
            if (!pos) return;

            const footprintCoords = _computeFootprint(pos.lat, pos.lng, pos.altKm);
            if (footprintCoords.length > 4) {
                satDataSource.entities.add({
                    id: 'footprint-' + satId,
                    polygon: {
                        hierarchy: Cesium.Cartesian3.fromDegreesArray(footprintCoords),
                        material: Cesium.Color.fromCssColorString(color).withAlpha(0.12),
                        outline: true,
                        outlineColor: Cesium.Color.fromCssColorString(color).withAlpha(0.5),
                        outlineWidth: 1,
                        height: 0
                    }
                });
                _activeFootprintSatId = satId;
            }
        }

        // Listen for entity selection on the viewer
        const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
        handler.setInputAction((click) => {
            const picked = viewer.scene.pick(click.position);
            if (Cesium.defined(picked) && picked.id) {
                const entityId = picked.id.id !== undefined ? picked.id.id : picked.id;

                // 위성 클릭 → footprint 토글 + 카메라 이동
                if (_satRecCache[entityId]) {
                    _toggleSatFootprint(entityId);
                    // footprint가 활성화되면 실시간 위치로 flyTo
                    if (_activeFootprintSatId === entityId) {
                        const pos = _getSatRealTimePosition(entityId);
                        if (pos) {
                            // footprint 반경의 ~4배 높이로 줌아웃 → 지구 위에서 해당 지역 한눈에 보기
                            const horizonAngle = Math.acos(6371 / (6371 + pos.altKm));
                            const footprintRadiusKm = 6371 * horizonAngle;
                            const viewAlt = Math.max(footprintRadiusKm * 4 * 1000, 8000000);
                            smoothFlyTo({
                                destination: Cesium.Cartesian3.fromDegrees(pos.lng, pos.lat, viewAlt)
                            });
                        }
                    }
                    return;
                }

                showShipInfo(picked.id);
                if (shipDataMap[entityId]) {
                    selectedProximityMmsi = entityId;
                    collisionTargetMmsi = null; // clear collision highlight on direct ship click
                    proximityMissCount = 0;
                    updateProximity();
                } else {
                    clearProximity();
                }
            } else {
                document.getElementById('shipInfoPanel').classList.remove('visible');
                clearProximity();
                // 빈 곳 클릭 → footprint 제거
                if (_activeFootprintSatId) {
                    const old = satDataSource.entities.getById('footprint-' + _activeFootprintSatId);
                    if (old) satDataSource.entities.remove(old);
                    _activeFootprintSatId = null;
                }
            }
        }, Cesium.ScreenSpaceEventType.LEFT_CLICK);
        // ── End Draggable Panels ──────────────────────────────────────────────
    </script>
</body>

</html>
