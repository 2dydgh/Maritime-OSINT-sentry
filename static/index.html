                        }
                    }
                    if (!stillExists) {
                        ds.entities.remove(entity);
                    }
                });

                const countEl = document.getElementById(`count-${type}`);
                if (countEl) countEl.textContent = typeShips.length.toLocaleString();
            });

        }

        let ws;
        function initWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            // Use window.location.host instead of default ws:// so it works in both dev (localhost) and prod
            const wsUrl = `${protocol}//${window.location.host}/api/v1/ws/ships`;

            console.log("Connecting to WebSocket:", wsUrl);
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                console.log("WebSocket connected!");
                const loadingEl = document.getElementById('loading');
                if (loadingEl && loadingEl.innerHTML.includes('INITIALIZING')) {
                    loadingEl.style.display = 'none';
                }
            };

            ws.onmessage = (event) => {
                // Only process WebSocket updates in LIVE mode
                if (timeMode !== 'live') return;

                try {
                    const data = JSON.parse(event.data);
                    if (data.type === "ships_update") {
                        updateShipsLayer(data.ships || []);

                        // Track which MMSIs are in the latest payload (for proximity staleness check)
                        latestWsShipsMmsis = new Set((data.ships || []).map(s => s.mmsi));

                        // Throttled proximity update
                        if (selectedProximityMmsi) {
                            const now = Date.now();
                            if (now - lastProximityUpdate >= PROXIMITY_THROTTLE_MS) {
                                lastProximityUpdate = now;
                                updateProximity();
                            }
                        }

                        document.getElementById('total-ships').textContent = (data.total_tracked || data.ship_count || 0).toLocaleString();
                        document.getElementById('stat-assets').textContent = data.total_tracked || data.ship_count || 0;

                        if (data.timestamp) {
                            const updated = new Date(data.timestamp);
                            document.getElementById('last-update').textContent = updated.toISOString().substring(11, 19);
                        }
                    }
                } catch (error) {
                    console.error("Error parsing WebSocket message:", error);
                }
            };

            ws.onerror = (error) => {
                console.error("WebSocket error:", error);
            };

            ws.onclose = () => {
                console.log("WebSocket closed. Reconnecting in 5 seconds...");
                setTimeout(initWebSocket, 5000);
            };
        }

        async function fetchData() {
            document.getElementById('loading').style.display = 'flex';
            try {
                const restrictedAreas = await Cesium.GeoJsonDataSource.load('/api/v1/restricted-areas', {
                    stroke: Cesium.Color.RED,
                    fill: Cesium.Color.RED.withAlpha(0.3),
                    strokeWidth: 3
                });
                await viewer.dataSources.add(restrictedAreas);

                const eventsResponse = await fetch('/api/v1/events');
                const eventsJson = await eventsResponse.json();
                const features = eventsJson.features || [];
                document.getElementById('stat-events').textContent = features.length;

                // Events are shown on map as markers (no feed cards — feed is now AIS alerts only)
                const eventsSrc = await Cesium.GeoJsonDataSource.load(eventsJson, {
                    markerSymbol: 'cross',
                    markerColor: Cesium.Color.fromCssColorString('#38bdf8'),
                    markerSize: 40
                });
                await viewer.dataSources.add(eventsSrc);


                // ---------------------------------------------------------------
                // Live Feed — AIS Anomaly Alert Polling
                // Polls /api/v1/alerts every 30s and prepends new cards to feedPanel
                // ---------------------------------------------------------------
                const seenAlertIds = new Set();

                function alertIcon(type) {
                    if (type === 'speeding')    return { icon: 'fa-gauge-high',         color: '#ef4444', label: 'SPEEDING' };
                    if (type === 'signal_lost') return { icon: 'fa-satellite-dish',      color: '#f97316', label: 'SIGNAL LOST' };
                    if (type === 'dest_change') return { icon: 'fa-right-left',          color: '#a78bfa', label: 'DEST CHANGE' };
                    return                              { icon: 'fa-triangle-exclamation', color: '#facc15', label: 'ALERT' };
                }

                async function fetchAndRenderAlerts() {
                    try {
                        const resp = await fetch('/api/v1/alerts?limit=50');
                        if (!resp.ok) return;
                        const alerts = await resp.json();
                        if (!alerts || alerts.length === 0) return;

                        const feedContainer = document.getElementById('eventFeed');

                        // Remove placeholder if present
                        const placeholder = feedContainer.querySelector('div[style]');
                        if (placeholder) placeholder.remove();

                        let newCount = 0;
                        // Prepend newest alerts that we haven't shown yet
                        for (const alert of alerts) {
                            if (seenAlertIds.has(alert.id)) continue;
                            seenAlertIds.add(alert.id);
                            newCount++;

                            const { icon, color, label } = alertIcon(alert.type);
                            const timeStr = new Date(alert.ts).toISOString().substring(11, 19) + 'Z';
                            const severity = alert.severity || 'medium';
                            const borderColor = severity === 'high' ? '#ef4444' : severity === 'medium' ? '#f97316' : '#a78bfa';

                            const card = document.createElement('div');
                            card.className = 'feed-card';
                            card.style.cssText = `border-left: 3px solid ${borderColor}; animation: feedCardIn 0.4s ease;`;
                            card.innerHTML = `
                                <div class="feed-meta" style="display:flex;justify-content:space-between;align-items:center;">
                                    <span style="color:${color};font-weight:700;font-size:0.7rem;letter-spacing:0.08em;">
                                        <i class="fa-solid ${icon}" style="margin-right:5px;"></i>${label}
                                    </span>
                                    <span style="color:var(--text-dim);font-size:0.7rem;"><i class="fa-solid fa-clock" style="margin-right:3px;"></i>${timeStr}</span>
                                </div>
                                <h3 class="feed-title" style="margin:6px 0 4px;font-size:0.85rem;">${alert.name || 'UNKNOWN VESSEL'}</h3>
                                <div style="color:var(--text-dim);font-size:0.75rem;line-height:1.5;">
                                    ${alert.message || ''}
                                    ${alert.country ? `<span style="margin-left:6px;opacity:0.7;">🏴 ${alert.country}</span>` : ''}
                                </div>
                            `;

                            // Click to fly to vessel location and select the entity
                            if (alert.lat && alert.lng) {
                                card.style.cursor = 'pointer';
                                card.addEventListener('click', () => {
                                    const mmsi = alert.mmsi;

                                    // 먼저 위치로 이동, 이동 완료 후 엔티티 찾기
                                    viewer.camera.flyTo({
                                        destination: Cesium.Cartesian3.fromDegrees(alert.lng, alert.lat, 50000.0),
                                        duration: 1.5,
                                        complete: () => {
                                            // 이동 완료 후 엔티티 찾기 (이제 뷰포트 안에 있음)
                                            // 엔티티 ID 타입이 숫자/문자열 모두 가능하므로 둘 다 시도
                                            setTimeout(() => {
                                                let found = false;
                                                for (const type in shipDataSources) {
                                                    const ds = shipDataSources[type];
                                                    const entity = ds.entities.getById(mmsi) || ds.entities.getById(String(mmsi)) || ds.entities.getById(Number(mmsi));
                                                    if (entity) {
                                                        viewer.selectedEntity = entity;
                                                        showShipInfo(entity);
                                                        found = true;
                                                        break;
                                                    }
                                                }
                                            }, 500); // WebSocket 업데이트 대기
                                        }
                                    });
                                });
                            }

                            // Prepend so newest is on top
                            feedContainer.insertBefore(card, feedContainer.firstChild);
                        }

                        // Keep feed from growing too large (max 80 cards)
                        const allCards = feedContainer.querySelectorAll('.feed-card');
                        if (allCards.length > 80) {
                            for (let i = 80; i < allCards.length; i++) allCards[i].remove();
                        }
                    } catch (e) {
                        console.warn('Alert fetch failed:', e);
                    }
                }

                // Initial fetch + polling every 30s
                fetchAndRenderAlerts();
                setInterval(fetchAndRenderAlerts, 30000);


                // Restore websocket for real-time data
                initWebSocket();

            } catch (error) {
                console.error("Error fetching map data:", error);
                document.getElementById('loading').innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> SYSTEM ERROR';
            } finally {
                if (document.getElementById('loading').innerHTML.includes('INITIALIZING')) {
                    document.getElementById('loading').style.display = 'none';
                }
            }
        }

        fetchData();

        // ── Sentinel-2 Right-click Imagery Search ─────────────────────────────
        document.body.insertAdjacentHTML('beforeend', `
            
            <div id="sentinelMenu" style="
                display:none; position:fixed; z-index:9999;
                background:rgba(10,14,27,0.96); border:1px solid rgba(99,102,241,0.4);
                border-radius:8px; padding:6px 0; min-width:210px;
                backdrop-filter:blur(12px); box-shadow:0 8px 32px rgba(0,0,0,0.6);
                font-family:'JetBrains Mono',monospace;">
                <div id="sentinelMenuBtn" style="
                    padding:10px 16px; cursor:pointer; color:#a5b4fc; font-size:0.78rem;
                    display:flex; align-items:center; gap:8px;"
                    onmouseover="this.style.background='rgba(99,102,241,0.15)'"
                    onmouseout="this.style.background='transparent'">
                    <i class="fa-solid fa-satellite-dish"></i>&nbsp;위성 영상 검색 (Sentinel-2)
                </div>
                <div style="padding:4px 16px 8px; color:rgba(165,180,252,0.45); font-size:0.68rem;">
                    <span id="sentinelMenuCoords">--</span>
                </div>
            </div>

            <div id="sentinelCard" class="drag-panel">
                <div id="sentinelCardHeader" class="drag-panel-header">
                    <span class="title">
                        <i class="fa-solid fa-satellite-dish"></i>&nbsp; SENTINEL-2 IMAGERY
                    </span>
                    <button class="close-btn" onclick="document.getElementById('sentinelCard').style.display='none'">&#x2715;</button>
                </div>
                <div id="sentinelCardBody" class="drag-panel-body"></div>
            </div>
        `);

        let _sentinelLat = null, _sentinelLng = null;

        viewer.cesiumWidget.canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            const cart = viewer.camera.pickEllipsoid(
                new Cesium.Cartesian2(e.offsetX, e.offsetY),
                viewer.scene.globe.ellipsoid
            );
            if (!cart) return;
            const carto = Cesium.Cartographic.fromCartesian(cart);
            _sentinelLat = +(Cesium.Math.toDegrees(carto.latitude).toFixed(4));
            _sentinelLng = +(Cesium.Math.toDegrees(carto.longitude).toFixed(4));
            const menu = document.getElementById('sentinelMenu');
            document.getElementById('sentinelMenuCoords').textContent = _sentinelLat + '\u00b0, ' + _sentinelLng + '\u00b0';
            menu.style.display = 'block';
            menu.style.left = Math.min(e.clientX, window.innerWidth - 230) + 'px';
            menu.style.top = Math.min(e.clientY, window.innerHeight - 100) + 'px';
        });

        document.addEventListener('click', () => {
            document.getElementById('sentinelMenu').style.display = 'none';
        });

        document.getElementById('sentinelMenuBtn').addEventListener('click', async (e) => {
            e.stopPropagation();
            document.getElementById('sentinelMenu').style.display = 'none';
            const card = document.getElementById('sentinelCard');
            const body = document.getElementById('sentinelCardBody');

            // Position below shipFilterPanel
            const filterPanel = document.getElementById('shipFilterPanel');
            const filterRect = filterPanel.getBoundingClientRect();
            card.style.top = (filterRect.bottom + 10) + 'px';

            // Show as flex so the column layout works for scrolling
            card.style.display = 'flex';
            body.innerHTML = '<div style="text-align:center;color:#6b7280;font-family:\'JetBrains Mono\',monospace;font-size:0.75rem;padding:30px 0;"><i class="fa-solid fa-circle-notch fa-spin"></i>&nbsp;Searching Sentinel-2...</div>';

            try {
                const res = await fetch('/api/v1/sentinel?lat=' + _sentinelLat + '&lng=' + _sentinelLng);
                const data = await res.json();

                if (!data.found) {
                    body.innerHTML = '<div style="text-align:center;color:#ef4444;font-size:0.75rem;padding:30px;">' + (data.message || data.error || 'No result') + '</div>';
                    return;
                }

                const dt = data.datetime ? new Date(data.datetime).toLocaleDateString('ko-KR') : '-';
                const cc = data.cloud_cover !== null ? data.cloud_cover + '%' : '-';
                const ccColor = parseFloat(data.cloud_cover) < 15 ? '#10b981' : parseFloat(data.cloud_cover) < 30 ? '#eab308' : '#ef4444';
                const href = data.fullres_url ? 'href="' + data.fullres_url + '" target="_blank"' : '';

                body.innerHTML =
                    (data.thumbnail_url ? '<a ' + href + '><img src="' + data.thumbnail_url + '" style="width:100%;border-radius:8px;border:1px solid var(--panel-border);display:block;margin-bottom:14px;"></a>' : '') +
                    '<table>' +
                    '<tr><th>촬영일</th><td>' + dt + '</td></tr>' +
                    '<tr><th>구름량</th><td style="color:' + ccColor + ';">' + cc + '</td></tr>' +
                    '<tr><th>플랫폼</th><td>' + (data.platform || 'Sentinel-2') + '</td></tr>' +
                    '<tr><th>좌표</th><td>' + _sentinelLat + '\u00b0, ' + _sentinelLng + '\u00b0</td></tr>' +
                    '</table>' +
                    (href ? '<a ' + href + ' style="display:block;margin-top:16px;text-align:center;color:var(--accent-cyan);font-family:\'Inter\',sans-serif;font-size:0.8rem;text-decoration:none;border:1px solid var(--panel-border);border-radius:6px;padding:10px;background:rgba(56,189,248,0.08);transition:background 0.2s;" onmouseover="this.style.background=\'rgba(56,189,248,0.15)\'" onmouseout="this.style.background=\'rgba(56,189,248,0.08)\'"><i class="fa-solid fa-expand"></i> 전체 화질로 뷰어 열기</a>' : '');
            } catch (err) {
                body.innerHTML = '<div style="text-align:center;color:#ef4444;font-size:0.75rem;padding:20px;">Error: ' + err.message + '</div>';
            }
        });
        // ── End Sentinel-2 ────────────────────────────────────────────────────

        // ── Draggable Panels ──────────────────────────────────────────────────
        function makeDraggable(panel, handle) {
            let isDragging = false, startX, startY, startLeft, startTop;

            handle.addEventListener('mousedown', (e) => {
                if (e.target.tagName === 'BUTTON') return; // Don't drag on close button
                isDragging = true;
                const rect = panel.getBoundingClientRect();
                startX = e.clientX;
                startY = e.clientY;
                startLeft = rect.left;
                startTop = rect.top;
                handle.style.cursor = 'grabbing';
                e.preventDefault();
            });

            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const dx = e.clientX - startX;
                const dy = e.clientY - startY;
                panel.style.left = (startLeft + dx) + 'px';
                panel.style.top = (startTop + dy) + 'px';
                panel.style.right = 'auto';
                panel.style.bottom = 'auto';
            });

            document.addEventListener('mouseup', () => {
                if (!isDragging) return;
                isDragging = false;
                handle.style.cursor = 'grab';
            });
        }

        // Make Sentinel-2 card draggable
        makeDraggable(
            document.getElementById('sentinelCard'),
            document.getElementById('sentinelCardHeader')
        );

        // Make Ship Info panel draggable
        makeDraggable(
            document.getElementById('shipInfoPanel'),
            document.getElementById('shipInfoHeader')
        );

        // Close button
        document.getElementById('shipInfoClose').addEventListener('click', () => {
            document.getElementById('shipInfoPanel').style.display = 'none';
            clearProximity();
        });

        // Show custom ship info panel when entity is clicked
        function showShipInfo(entity) {
            const panel = document.getElementById('shipInfoPanel');
            const title = document.getElementById('shipInfoTitle');
            const body = document.getElementById('shipInfoBody');

            const name = entity.name || 'UNKNOWN';
            title.textContent = name;

            // Get description HTML from CallbackProperty or string
            let descHtml = '';
            if (entity.description) {
                if (entity.description.getValue) {
                    descHtml = entity.description.getValue(viewer.clock.currentTime);
                } else {
                    descHtml = entity.description;
                }
            }

            body.innerHTML = descHtml || '<p style="color:var(--text-dim);font-size:0.8rem;">No details available</p>';
            panel.style.display = 'flex';
        }

        // Listen for entity selection on the viewer
        const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
        handler.setInputAction((click) => {
            const picked = viewer.scene.pick(click.position);
            if (Cesium.defined(picked) && picked.id) {
                showShipInfo(picked.id);
                // Activate proximity only for ship entities
                // picked.id is a Cesium Entity; picked.id.id is the entity's ID (= ship.mmsi)
                const entityId = picked.id.id !== undefined ? picked.id.id : picked.id;
                if (shipDataMap[entityId]) {
                    selectedProximityMmsi = entityId;
                    proximityMissCount = 0;
                    updateProximity();
                } else {
                    clearProximity();
                }
            } else {
                document.getElementById('shipInfoPanel').style.display = 'none';
                clearProximity();
            }
        }, Cesium.ScreenSpaceEventType.LEFT_CLICK);
        // ── End Draggable Panels ──────────────────────────────────────────────
    </script>
</body>

</html>
