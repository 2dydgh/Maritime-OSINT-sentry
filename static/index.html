<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <title>Maritime OSINT Sentry | Strategic Dashboard</title>
    <!-- Use version 1.114 of Cesium -->
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <!-- satellite.js for real-time client-side satellite orbit propagation -->
    <script src="https://cdn.jsdelivr.net/npm/satellite.js@5.0.0/dist/satellite.min.js"></script>

    <!-- Modern Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-bg: rgba(16, 23, 41, 0.75);
            --panel-border: rgba(56, 189, 248, 0.2);
            --accent-cyan: #38bdf8;
            --accent-red: #f43f5e;
            --accent-green: #10b981;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        #cesiumContainer {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Glassmorphism UI Base */
        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        /* Top Navigation Header */
        header {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            height: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        .pulse-dot {
            width: 10px;
            height: 10px;
            background-color: var(--accent-red);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-red);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.7);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(244, 63, 94, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(244, 63, 94, 0);
            }
        }

        .header-stats {
            display: flex;
            gap: 30px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .stat-value {
            color: var(--accent-cyan);
            font-weight: 700;
            font-size: 1.1rem;
        }

        .stat-label {
            color: var(--text-dim);
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        /* Left Sidebar: OSINT Feed */
        #feedPanel {
            position: absolute;
            top: 100px;
            left: 20px;
            width: 350px;
            bottom: 180px;
            display: flex;
            flex-direction: column;
            padding: 20px;
            transition: transform 0.3s ease;
        }

        #feedPanel.collapsed {
            bottom: auto !important;
        }

        #feedPanel.collapsed .feed-list {
            display: none;
        }

        #feedPanel h2 {
            margin: 0 0 15px 0;
            font-size: 1.1rem;
            color: var(--accent-cyan);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #feedPanel.collapsed h2 {
            margin-bottom: 0;
        }

        .collapse-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 0.85rem;
            transition: color 0.2s;
            padding: 2px 6px;
        }

        .collapse-btn:hover {
            color: #38bdf8;
        }

        .feed-list {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 5px;
        }

        /* Custom Scrollbar */
        .feed-list::-webkit-scrollbar {
            width: 6px;
        }

        .feed-list::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 3px;
        }

        .feed-list::-webkit-scrollbar-thumb {
            background: var(--accent-cyan);
            border-radius: 3px;
        }

        .feed-card {
            background: rgba(255, 255, 255, 0.03);
            border-left: 3px solid var(--accent-cyan);
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 0 8px 8px 0;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .feed-card:hover {
            background: rgba(56, 189, 248, 0.1);
            transform: translateX(5px);
        }

        .feed-card.explosion {
            border-left-color: var(--accent-red);
        }

        .feed-card.unknown_movement {
            border-left-color: var(--accent-green);
        }

        .feed-meta {
            display: flex;
            justify-content: space-between;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .feed-title {
            font-size: 0.9rem;
            line-height: 1.4;
            margin: 0;
        }

        /* Loading Overlay Overlayed */
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            color: var(--accent-cyan);
            font-weight: 600;
            font-size: 1.2rem;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Cesium UI Overrides */
        .cesium-viewer-timelineContainer {
            z-index: 10;
            bottom: 25px !important;
            left: 480px !important;
            right: 20px !important;
            width: auto !important;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--panel-border);
        }

        .cesium-viewer-animationContainer {
            display: none !important;
        }

        .cesium-widget-credits {
            display: none !important;
        }

        /* Hide credits for cleaner UI */
        /* Ship Filter Panel */
        #shipFilterPanel {
            position: absolute;
            top: 100px;
            right: 20px;
            width: 220px;
            padding: 15px;
            z-index: 10;
        }

        #shipFilterPanel h3 {
            margin: 0 0 12px 0;
            font-size: 0.95rem;
            color: var(--accent-cyan);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #shipFilterPanel.collapsed .filter-content {
            display: none;
        }

        #shipFilterPanel.collapsed h3 {
            margin-bottom: 0;
        }

        .filter-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .filter-item label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .filter-item input[type="checkbox"] {
            accent-color: var(--accent-cyan);
        }

        .filter-count {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        .color-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        .color-cargo {
            background-color: #10b981;
        }

        .color-tanker {
            background-color: #f97316;
        }

        .color-passenger {
            background-color: #0ea5e9;
            /* Sky blue */
        }

        .color-fishing {
            background-color: #eab308;
        }

        .color-military {
            background-color: #ef4444;
        }

        .color-tug {
            background-color: #a855f7;
        }

        .color-other {
            background-color: #6b7280;
        }

        #shipStats {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--panel-border);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        /* Ship Info Panel positioning */
        #shipInfoPanel {
            top: 100px;
            right: 285px;
            width: 320px;
            max-height: 620px;
            z-index: 9997;
        }

        /* Nearby Vessels proximity list */
        #nearbyVesselsSection {
            border-top: 1px solid var(--panel-border);
            margin-top: 10px;
            max-height: 260px;
            overflow-y: auto;
            padding: 10px 12px;
            display: none;
        }

        #nearbyVesselsSection::-webkit-scrollbar { width: 6px; }
        #nearbyVesselsSection::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.1); border-radius: 3px; }
        #nearbyVesselsSection::-webkit-scrollbar-thumb { background: var(--accent-cyan); border-radius: 3px; }

        #nearbyVesselsSection .section-title {
            font-family: 'Inter', sans-serif;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--accent-cyan);
            letter-spacing: 0.05em;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .nearby-row {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 0.75rem;
            font-family: 'JetBrains Mono', monospace;
            transition: background 0.15s;
            border-radius: 4px;
            padding: 4px 6px;
        }

        .nearby-row:hover {
            background: rgba(56, 189, 248, 0.1);
        }

        .nearby-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .nearby-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--text-main);
        }

        .nearby-dist {
            color: var(--text-dim);
            flex-shrink: 0;
        }

        /* Sentinel-2 Panel positioning */
        #sentinelCard {
            right: 20px;
            width: 260px;
            max-width: 92vw;
            max-height: 400px;
            z-index: 9998;
        }

        /* Shared draggable panel styles */
        .drag-panel {
            display: none;
            position: fixed;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            flex-direction: column;
            overflow: hidden;
        }

        .drag-panel-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--panel-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: grab;
            user-select: none;
            flex-shrink: 0;
        }

        .drag-panel-header .title {
            color: #38bdf8;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .drag-panel-header .close-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 1rem;
            transition: color 0.2s;
            flex-shrink: 0;
            margin-left: 8px;
        }

        .drag-panel-header .close-btn:hover {
            color: #fff;
        }

        .drag-panel-body {
            padding: 14px 16px;
            overflow-y: auto;
            flex-grow: 1;
        }

        .drag-panel-body::-webkit-scrollbar { width: 6px; }
        .drag-panel-body::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.1); border-radius: 3px; }
        .drag-panel-body::-webkit-scrollbar-thumb { background: var(--accent-cyan); border-radius: 3px; }

        .drag-panel-body table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
        }

        .drag-panel-body th {
            color: var(--text-dim);
            text-align: left;
            padding-right: 12px;
            white-space: nowrap;
            font-weight: 400;
        }

        .drag-panel-body td {
            color: #e2e8f0;
            text-align: right;
        }

        /* Time Control Bar */
        #timeControlBar {
            position: fixed;
            bottom: 25px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 2px;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--panel-border);
            border-radius: 10px;
            padding: 6px 10px;
            z-index: 10;
            transition: border-color 0.3s;
            min-width: 440px;
        }

        #timeControlBar.history-active {
            border-color: rgba(168, 85, 247, 0.3);
        }

        .tcb-divider {
            width: 1px;
            height: 24px;
            background: var(--panel-border);
            margin: 0 8px;
            transition: background 0.3s;
        }

        #timeControlBar.history-active .tcb-divider {
            background: rgba(168, 85, 247, 0.3);
        }

        .tcb-mode-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--panel-border);
            color: var(--text-dim);
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .tcb-mode-btn.active {
            background: rgba(56, 189, 248, 0.2);
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
        }

        .tcb-mode-btn.history.active {
            background: rgba(168, 85, 247, 0.2);
            border-color: #a855f7;
            color: #a855f7;
        }

        .tcb-mode-btn:hover:not(.active) {
            background: rgba(56, 189, 248, 0.1);
        }

        .tcb-play-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--panel-border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-dim);
            font-size: 0.7rem;
            transition: all 0.2s;
        }

        .tcb-play-btn.main {
            width: 34px;
            height: 34px;
            font-size: 0.85rem;
        }

        .tcb-play-btn:disabled {
            opacity: 0.3;
            cursor: default;
            pointer-events: none;
        }

        .tcb-play-btn.enabled {
            color: #a855f7;
            border-color: rgba(168, 85, 247, 0.25);
            background: rgba(168, 85, 247, 0.1);
        }

        .tcb-play-btn.enabled:hover {
            background: rgba(168, 85, 247, 0.2);
        }

        .tcb-play-btn.enabled.main {
            border-color: rgba(168, 85, 247, 0.4);
            background: rgba(168, 85, 247, 0.2);
        }

        .tcb-play-btn.enabled.active-reverse {
            background: rgba(168, 85, 247, 0.3);
            border-color: #a855f7;
        }

        #tcb-speed {
            color: var(--text-dim);
            font-size: 0.72rem;
            font-family: 'JetBrains Mono', monospace;
            min-width: 36px;
            text-align: center;
            transition: color 0.3s;
        }

        #tcb-speed.active {
            color: #a855f7;
            font-weight: 700;
        }

        #tcb-time-display {
            color: var(--accent-cyan);
            font-size: 0.78rem;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.03em;
            transition: color 0.3s;
            white-space: nowrap;
        }

        #tcb-time-display.history {
            color: #a855f7;
        }
    </style>
</head>

<body>
    <!-- Background 3D Globe -->
    <div id="cesiumContainer"></div>

    <!-- Top Header -->
    <header class="glass-panel">
        <div class="header-brand">
            <div class="pulse-dot"></div>
            MARITIME OSINT SENTRY
            <span style="color: var(--text-dim); font-weight: 300; font-size: 0.9rem;">| STRATEGIC
                DASHBOARD</span>
        </div>
        <div class="header-stats">
            <div class="stat-item">
                <span class="stat-value" id="stat-events">0</span>
                <span class="stat-label">Active Events</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="stat-assets">7</span>
                <span class="stat-label">Tracked Assets</span>
            </div>
        </div>
    </header>

    <!-- Left Feed Panel -->
    <div id="feedPanel" class="glass-panel">
        <h2>
            <span><i class="fa-solid fa-tower-broadcast" style="margin-right: 8px;"></i> LIVE FEED</span>
            <button class="collapse-btn" onclick="this.closest('#feedPanel').classList.toggle('collapsed'); this.querySelector('i').classList.toggle('fa-chevron-down'); this.querySelector('i').classList.toggle('fa-chevron-up');">
                <i class="fa-solid fa-chevron-down"></i>
            </button>
        </h2>
        <div class="feed-list" id="eventFeed">
            <!-- Feed cards will be injected here by JS -->
            <div
                style="text-align: center; color: var(--text-dim); font-style: italic; margin-top: 20px; font-size: 0.9rem;">
                Awaiting intelligence data...
            </div>
        </div>
    </div>

    <div id="shipFilterPanel" class="glass-panel">
        <h3>
            <span><i class="fa-solid fa-ship"></i> SHIP FILTERS</span>
            <button class="collapse-btn" style="margin-left:auto;" onclick="this.closest('#shipFilterPanel').classList.toggle('collapsed'); this.querySelector('i').classList.toggle('fa-chevron-down'); this.querySelector('i').classList.toggle('fa-chevron-up');">
                <i class="fa-solid fa-chevron-down"></i>
            </button>
        </h3>
        <div class="filter-content">
        <div class="filter-item">
            <label><input type="checkbox" id="filter-cargo" checked><span class="color-dot color-cargo"></span>
                Cargo</label>
            <span class="filter-count" id="count-cargo">0</span>
        </div>
        <div class="filter-item">
            <label><input type="checkbox" id="filter-tanker" checked><span class="color-dot color-tanker"></span>
                Tanker</label>
            <span class="filter-count" id="count-tanker">0</span>
        </div>
        <div class="filter-item">
            <label><input type="checkbox" id="filter-passenger" checked><span class="color-dot color-passenger"></span>
                Passenger</label>
            <span class="filter-count" id="count-passenger">0</span>
        </div>
        <div class="filter-item">
            <label><input type="checkbox" id="filter-fishing" checked><span class="color-dot color-fishing"></span>
                Fishing</label>
            <span class="filter-count" id="count-fishing">0</span>
        </div>
        <div class="filter-item">
            <label><input type="checkbox" id="filter-military" checked><span class="color-dot color-military"></span>
                Military</label>
            <span class="filter-count" id="count-military">0</span>
        </div>
        <div class="filter-item">
            <label><input type="checkbox" id="filter-tug" checked><span class="color-dot color-tug"></span> Tug</label>
            <span class="filter-count" id="count-tug">0</span>
        </div>
        <div class="filter-item">
            <label><input type="checkbox" id="filter-other" checked><span class="color-dot color-other"></span>
                Other</label>
            <span class="filter-count" id="count-other">0</span>
        </div>
        <!-- Weather Layers -->
        <hr style="border: 0; border-top: 1px solid rgba(255, 255, 255, 0.1); margin: 15px 0;">
        <h3><i class="fa-solid fa-cloud-showers-heavy"></i> WEATHER LAYERS</h3>
        <div class="filter-item">
            <label><input type="checkbox" id="layer-clouds"><span class="color-dot"
                    style="background-color: #3b82f6;"></span> Global Precipitation Radar</label>
        </div>

        <!-- Satellite Layer -->
        <hr style="border: 0; border-top: 1px solid rgba(255, 255, 255, 0.1); margin: 15px 0;">
        <h3><i class="fa-solid fa-satellite"></i> SATELLITES</h3>
        <div class="filter-item">
            <label><input type="checkbox" id="layer-sats"><span class="color-dot"
                    style="background-color: #a78bfa;"></span> Intel Satellites</label>
        </div>
        <div id="satStats"
            style="margin-top:8px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--text-dim);">
            Total: <span id="total-sats">0</span> tracked
        </div>

        <div id="shipStats">
            <div>Total: <span id="total-ships">0</span> vessels</div>
            <div>Updated: <span id="last-update">--:--:--</span> UTC</div>
        </div>
        </div><!-- /filter-content -->
    </div>

    <!-- Custom Ship Info Panel -->
    <div id="shipInfoPanel" class="drag-panel">
        <div id="shipInfoHeader" class="drag-panel-header">
            <span class="title" id="shipInfoTitle">—</span>
            <button class="close-btn" id="shipInfoClose">&#x2715;</button>
        </div>
        <div id="shipInfoBody" class="drag-panel-body"></div>
        <div id="nearbyVesselsSection">
            <div class="section-title">NEARBY VESSELS</div>
            <div id="nearbyVesselsList"></div>
        </div>
    </div>

    <!-- Centered Loader -->
    <div id="loading" class="glass-panel">
        <i class="fa-solid fa-circle-notch fa-spin"></i> INITIALIZING SYSTEM
    </div>

    <!-- Time Control Bar -->
    <div id="timeControlBar">
        <div style="display:flex;gap:3px;margin-right:2px;">
            <button id="tcb-btn-live" class="tcb-mode-btn active">
                <i class="fa-solid fa-broadcast-tower"></i> LIVE
            </button>
            <button id="tcb-btn-history" class="tcb-mode-btn history">
                <i class="fa-solid fa-clock-rotate-left"></i> HISTORY
            </button>
        </div>
        <div class="tcb-divider"></div>
        <div style="display:flex;align-items:center;gap:6px;">
            <button id="tcb-reverse" class="tcb-play-btn" disabled title="Reverse">
                <i class="fa-solid fa-backward"></i>
            </button>
            <button id="tcb-playpause" class="tcb-play-btn main" disabled title="Play/Pause">
                <i class="fa-solid fa-play" id="tcb-playpause-icon"></i>
            </button>
            <button id="tcb-ff" class="tcb-play-btn" disabled title="Speed Up">
                <i class="fa-solid fa-forward"></i>
            </button>
        </div>
        <div class="tcb-divider"></div>
        <span id="tcb-speed">1x</span>
        <div class="tcb-divider"></div>
        <span id="tcb-time-display">--:--:-- Z</span>
    </div>

    <script>
        Cesium.Ion.defaultAccessToken = '';

        const viewer = new Cesium.Viewer('cesiumContainer', {
            animation: true,
            timeline: true,
            infoBox: false,
            baseLayerPicker: false,
            geocoder: false,
            homeButton: false,
            sceneModePicker: false,
            navigationHelpButton: false,
            fullscreenButton: false,
            // 해양 지형과 수심이 강조된 해상 지도 (Esri Ocean)
            baseLayer: new Cesium.ImageryLayer(new Cesium.UrlTemplateImageryProvider({
                url: 'https://services.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Base/MapServer/tile/{z}/{y}/{x}',
                credit: '© Esri, GEBCO, NOAA, National Geographic, DeLorme, HERE, Geonames.org',
                minimumLevel: 0,
                maximumLevel: 13
            }))
        });

        // ── Hybrid Map: Ocean (low zoom) + OSM (high zoom) ─────────────────────
        // OpenStreetMap 레이어 추가 (높은 줌 레벨용)
        const osmLayer = viewer.imageryLayers.addImageryProvider(
            new Cesium.UrlTemplateImageryProvider({
                url: 'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
                credit: '© OpenStreetMap contributors',
                minimumLevel: 0,
                maximumLevel: 19
            })
        );
        osmLayer.alpha = 0; // 처음엔 투명

        // 카메라 높이에 따라 레이어 전환 (Esri Ocean max level 13 ≈ 150km)
        viewer.camera.changed.addEventListener(() => {
            const height = viewer.camera.positionCartographic.height;
            // 150km 이하로 내려가면 OSM 표시 시작 (Esri 한계 전에 전환)
            if (height < 150000) {
                // 높이에 따라 부드럽게 전환 (150km~50km 사이)
                const t = Math.max(0, Math.min(1, (150000 - height) / 100000));
                osmLayer.alpha = t;
            } else {
                osmLayer.alpha = 0;
            }
        });

        // ── Globe appearance: tactical dark style ─────────────────────────────
        const scene = viewer.scene;
        const globe = viewer.scene.globe;

        // Enable real-time sun lighting (day/night terminator)
        globe.enableLighting = true;

        // Sync Cesium clock to real wall-clock time so lighting is accurate
        const now = Cesium.JulianDate.now();
        viewer.clock.currentTime = now;
        viewer.clock.shouldAnimate = false; // Don't advance the simulation clock
        // Live clock sync is now managed by the Time Travel Mode section below

        // Deep space atmosphere — more dramatic blue-violet glow
        scene.skyAtmosphere.hueShift = -0.05;      // slight blue shift
        scene.skyAtmosphere.saturationShift = 0.3;  // more vivid
        scene.skyAtmosphere.brightnessShift = -0.1; // slightly dimmer

        // Deep black ocean for unlit areas
        globe.baseColor = Cesium.Color.fromCssColorString('#0a0c14');

        // Minimal ambient light at night to keep dark side visible
        globe.dynamicAtmosphereLighting = true;
        globe.dynamicAtmosphereLightingFromSun = true;

        // Remove the Cesium default credit banner (keeps UI clean)
        viewer.cesiumWidget.creditContainer.style.display = 'none';
        // ── End globe style ───────────────────────────────────────────────────

        // Default view
        viewer.camera.flyTo({
            destination: Cesium.Cartesian3.fromDegrees(53.0, 24.0, 3000000.0)
        });

        // ── Time Control Bar Logic ───────────────────────────────────────────
        const SPEED_STEPS = [1, 10, 60, 300, 600];
        let currentSpeedIndex = 2; // default 60x
        let _lastPlayingState = null;
        let _lastReverseState = null;

        function updateClock() {
            if (timeMode !== 'live') return; // guard: don't overwrite history time display
            const now = new Date();
            document.getElementById('tcb-time-display').textContent = now.toISOString().substring(11, 19) + " Z";
        }
        setInterval(updateClock, 1000);
        updateClock();

        function updatePlaybackUI() {
            const playing = viewer.clock.shouldAnimate;
            const isReverse = viewer.clock.multiplier < 0;

            // Skip DOM updates if state hasn't changed (called on every tick)
            if (playing === _lastPlayingState && isReverse === _lastReverseState) return;
            _lastPlayingState = playing;
            _lastReverseState = isReverse;

            const icon = document.getElementById('tcb-playpause-icon');
            icon.className = playing ? 'fa-solid fa-pause' : 'fa-solid fa-play';

            const reverseBtn = document.getElementById('tcb-reverse');
            if (isReverse) {
                reverseBtn.classList.add('active-reverse');
            } else {
                reverseBtn.classList.remove('active-reverse');
            }

            const speed = Math.abs(viewer.clock.multiplier);
            document.getElementById('tcb-speed').textContent = speed + 'x';
        }

        function forceUpdatePlaybackUI() {
            _lastPlayingState = null;
            _lastReverseState = null;
            updatePlaybackUI();
        }

        function enablePlaybackButtons(enabled) {
            const btns = ['tcb-reverse', 'tcb-playpause', 'tcb-ff'];
            btns.forEach(id => {
                const btn = document.getElementById(id);
                if (enabled) {
                    btn.disabled = false;
                    btn.classList.add('enabled');
                } else {
                    btn.disabled = true;
                    btn.classList.remove('enabled', 'active-reverse');
                }
            });
            if (enabled) {
                document.getElementById('tcb-speed').classList.add('active');
            } else {
                document.getElementById('tcb-speed').classList.remove('active');
                document.getElementById('tcb-speed').textContent = '1x';
            }
        }

        // Play/Pause
        document.getElementById('tcb-playpause').addEventListener('click', () => {
            viewer.clock.shouldAnimate = !viewer.clock.shouldAnimate;
            forceUpdatePlaybackUI();
        });

        // Reverse toggle
        document.getElementById('tcb-reverse').addEventListener('click', () => {
            const m = viewer.clock.multiplier;
            viewer.clock.multiplier = m < 0 ? Math.abs(m) : -Math.abs(m);
            if (!viewer.clock.shouldAnimate) {
                viewer.clock.shouldAnimate = true;
            }
            forceUpdatePlaybackUI();
        });

        // Fast Forward — cycle speed steps
        document.getElementById('tcb-ff').addEventListener('click', () => {
            currentSpeedIndex = (currentSpeedIndex + 1) % SPEED_STEPS.length;
            const sign = viewer.clock.multiplier < 0 ? -1 : 1;
            viewer.clock.multiplier = sign * SPEED_STEPS[currentSpeedIndex];
            if (!viewer.clock.shouldAnimate) {
                viewer.clock.shouldAnimate = true;
            }
            forceUpdatePlaybackUI();
        });
        // ── End Time Control Bar Logic ───────────────────────────────────────

        // ── Satellite Colors & Icon (needed by Time Travel Mode) ─────────────
        const SAT_COLORS = {
            military_recon: '#ef4444', // Red
            military_sar: '#f97316', // Orange
            sar: '#f97316', // Orange
            sigint: '#eab308', // Yellow
            navigation: '#10b981', // Green
            early_warning: '#a855f7', // Purple
            space_station: '#3b82f6', // Blue
            commercial_imaging: '#94a3b8', // Grey-blue
        };

        function getSatIcon(colorHex) {
            const svg = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><circle cx='12' cy='12' r='3' fill='${colorHex}'/><line x1='12' y1='2' x2='12' y2='6' stroke='${colorHex}' stroke-width='2'/><line x1='12' y1='18' x2='12' y2='22' stroke='${colorHex}' stroke-width='2'/><line x1='2' y1='12' x2='6' y2='12' stroke='${colorHex}' stroke-width='2'/><line x1='18' y1='12' x2='22' y2='12' stroke='${colorHex}' stroke-width='2'/></svg>`;
            return "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
        }

        // Satellite data source (needed by both Time Travel and Satellite Layer sections)
        const satDataSource = new Cesium.CustomDataSource('Satellites');
        viewer.dataSources.add(satDataSource);
        satDataSource.show = false;

        // TLE cache for satellite.js propagation
        let _satRecCache = {};

        // Ship data sources (needed by Time Travel Mode for entity cleanup)
        const shipDataSources = {};
        const SHIP_TYPES = ['cargo', 'tanker', 'passenger', 'fishing', 'military', 'tug', 'other'];
        // ─────────────────────────────────────────────────────────────────────

        // ── Time Travel Mode ───────────────────────────────────────────────────
        let timeMode = 'live'; // 'live' | 'history'
        let liveClockIntervalId = null;
        let historyRange = { min: null, max: null };

        // Sliding window state
        const WINDOW_HALF_MS = 30 * 60 * 1000; // ±30 minutes = 1 hour window
        let currentWindowCenter = null; // Date object: center of current window
        let currentWindowStart = null;  // Date object
        let currentWindowEnd = null;    // Date object
        let isLoadingWindow = false;    // Prevents concurrent loads
        let historyInterpolationLoaded = false;

        // Debounce function
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // Get current viewport bounding box as query string params
        function getViewportBbox() {
            const rect = viewer.camera.computeViewRectangle();
            if (!rect) return '';
            const buffer = 0.5; // degrees buffer
            const west = Cesium.Math.toDegrees(rect.west) - buffer;
            const south = Cesium.Math.toDegrees(rect.south) - buffer;
            const east = Cesium.Math.toDegrees(rect.east) + buffer;
            const north = Cesium.Math.toDegrees(rect.north) + buffer;
            return `&west=${west.toFixed(4)}&south=${south.toFixed(4)}&east=${east.toFixed(4)}&north=${north.toFixed(4)}`;
        }

        // Fetch helper with configurable timeout (aborts stale requests)
        function fetchWithTimeout(url, timeoutMs = 10000) {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeoutMs);
            return fetch(url, { signal: controller.signal }).finally(() => clearTimeout(id));
        }

        // Load history data for a sliding window centered on centerDate
        // silent=true: no loading indicator, used for auto-reload during playback
        async function loadHistoryWindow(centerDate, { silent = false } = {}) {
            if (isLoadingWindow) return;
            isLoadingWindow = true;

            // Show loading indicator only on non-silent loads (initial, timeline jump)
            if (!silent) {
                document.getElementById('loading').style.display = 'flex';
                document.getElementById('loading').innerHTML = '<i class="fa-solid fa-clock-rotate-left fa-spin"></i> LOADING HISTORY...';
            }

            const windowStart = new Date(centerDate.getTime() - WINDOW_HALF_MS);
            const windowEnd = new Date(centerDate.getTime() + WINDOW_HALF_MS);
            const startIso = windowStart.toISOString();
            const endIso = windowEnd.toISOString();

            console.log('[HISTORY] Loading window:', startIso, 'to', endIso, silent ? '(silent)' : '');

            try {
                const bbox = getViewportBbox();
                const res = await fetchWithTimeout(
                    `/api/v1/history/trajectories?start=${encodeURIComponent(startIso)}&end=${encodeURIComponent(endIso)}&limit_per_ship=60${bbox}`,
                    15000
                );
                if (!res.ok) {
                    console.error('[HISTORY] Trajectory API error:', res.status);
                    if (!silent) {
                        document.getElementById('loading').innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> LOAD ERROR';
                        setTimeout(() => document.getElementById('loading').style.display = 'none', 2000);
                    }
                    return;
                }

                const data = await res.json();
                const ships = data.ships || {};
                const shipCount = Object.keys(ships).length;
                console.log('[HISTORY] Loaded trajectories for', shipCount, 'ships');

                // Build new entities first, then swap (clear old → add new in one batch)
                // Collect new entity definitions
                const newEntities = [];
                for (const [mmsi, shipData] of Object.entries(ships)) {
                    if (shipData.points.length < 2) continue;

                    const type = shipData.type || 'other';
                    const ds = shipDataSources[type] || shipDataSources['other'];
                    if (!ds) continue;

                    const positionProperty = new Cesium.SampledPositionProperty();
                    positionProperty.setInterpolationOptions({
                        interpolationDegree: 1,
                        interpolationAlgorithm: Cesium.LinearApproximation
                    });

                    const headingProperty = new Cesium.SampledProperty(Number);

                    shipData.points.forEach(pt => {
                        const time = Cesium.JulianDate.fromIso8601(pt.time);
                        const position = Cesium.Cartesian3.fromDegrees(pt.lng, pt.lat);
                        positionProperty.addSample(time, position);
                        headingProperty.addSample(time, pt.heading || 0);
                    });

                    newEntities.push({ ds, def: {
                        id: mmsi,
                        name: shipData.name || 'UNKNOWN',
                        description: `
                            <table class="cesium-infoBox-defaultTable">
                                <tbody>
                                    <tr><th>Name</th><td>${shipData.name}</td></tr>
                                    <tr><th>MMSI</th><td>${mmsi}</td></tr>
                                    <tr><th>Type</th><td>${shipData.type}</td></tr>
                                    <tr><th>Country</th><td>${shipData.country}</td></tr>
                                </tbody>
                            </table>
                        `,
                        position: positionProperty,
                        billboard: {
                            image: getShipIcon(SHIP_COLORS[type] || SHIP_COLORS['other']),
                            width: 14,
                            height: 16,
                            rotation: new Cesium.CallbackProperty(() => {
                                const heading = headingProperty.getValue(viewer.clock.currentTime);
                                return Cesium.Math.toRadians(-(heading || 0));
                            }, false)
                        }
                    }});
                }

                // Now swap: clear old entities then add new ones
                SHIP_TYPES.forEach(type => {
                    if (shipDataSources[type]) {
                        shipDataSources[type].entities.removeAll();
                    }
                });
                newEntities.forEach(({ ds, def }) => ds.entities.add(def));

                // Update window state
                currentWindowCenter = centerDate;
                currentWindowStart = windowStart;
                currentWindowEnd = windowEnd;
                historyInterpolationLoaded = true;

                // Update UI stats
                document.getElementById('total-ships').textContent = shipCount.toLocaleString();
                document.getElementById('stat-assets').textContent = shipCount;

                if (!silent) {
                    document.getElementById('loading').style.display = 'none';
                }
                console.log('[HISTORY] Window loaded:', shipCount, 'ships');

            } catch (err) {
                console.error('[HISTORY] Error loading window:', err);
                if (!silent) {
                    document.getElementById('loading').innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> LOAD ERROR';
                    setTimeout(() => {
                        document.getElementById('loading').style.display = 'none';
                        setTimeMode('live');
                    }, 2000);
                }
            } finally {
                isLoadingWindow = false;
            }
        }


        // Update satellites for a specific time (history mode)
        // Server already calculates SGP4 positions for the requested time
        function updateSatellitesForTime(sats, targetDate) {
            // Use server-provided pre-calculated positions
            sats.forEach(sat => {
                const satId = String(sat.id);
                const lat = sat.lat;
                const lng = sat.lng;
                const altKm = sat.alt_km || 0;
                const color = SAT_COLORS[sat.mission] || '#94a3b8';
                const position = Cesium.Cartesian3.fromDegrees(lng, lat, altKm * 1000);

                let entity = satDataSource.entities.getById(satId);
                if (!entity) {
                    // Create entity if it doesn't exist
                    satDataSource.entities.add({
                        id: satId,
                        name: sat.name,
                        description: `
                            <table class="cesium-infoBox-defaultTable"><tbody>
                                <tr><th>Name</th><td>${sat.name}</td></tr>
                                <tr><th>NORAD ID</th><td>${sat.id}</td></tr>
                                <tr><th>Country</th><td>${sat.country || 'UNKNOWN'}</td></tr>
                                <tr><th>Mission</th><td>${sat.sat_type || sat.mission || '-'}</td></tr>
                                <tr><th>Altitude</th><td>${Math.round(altKm)} km</td></tr>
                                <tr><th>Speed</th><td>${sat.speed_knots || 0} kts</td></tr>
                                ${sat.wiki ? `<tr><th>Info</th><td><a href="${sat.wiki}" target="_blank">Wikipedia</a></td></tr>` : ''}
                            </tbody></table>
                        `,
                        position: position,
                        billboard: {
                            image: getSatIcon(color),
                            width: 18,
                            height: 18,
                            scaleByDistance: new Cesium.NearFarScalar(1.5e7, 1.5, 8.0e7, 0.5),
                            disableDepthTestDistance: Number.POSITIVE_INFINITY
                        },
                        label: {
                            text: sat.name,
                            font: '10px JetBrains Mono, monospace',
                            fillColor: Cesium.Color.fromCssColorString(color),
                            outlineColor: Cesium.Color.BLACK,
                            outlineWidth: 2,
                            style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                            pixelOffset: new Cesium.Cartesian2(0, -20),
                            distanceDisplayCondition: new Cesium.DistanceDisplayCondition(0, 2e7),
                            disableDepthTestDistance: Number.POSITIVE_INFINITY
                        }
                    });
                } else {
                    entity.position = position;
                }

                // Update cache for consistency
                _satRecCache[satId] = { satrec: null, sat };
            });

            // Remove satellites not in the current result
            const currentIds = new Set(sats.map(s => String(s.id)));
            satDataSource.entities.values
                .filter(e => !currentIds.has(e.id))
                .forEach(e => satDataSource.entities.remove(e));

            document.getElementById('total-sats').textContent = sats.length;
        }

        // Load history time range from API
        async function loadHistoryRange() {
            try {
                const res = await fetchWithTimeout('/api/v1/history/range');
                if (!res.ok) {
                    console.warn('History range API not available');
                    return false;
                }
                const range = await res.json();

                if (range.min_time && range.max_time) {
                    historyRange.min = range.min_time;
                    historyRange.max = range.max_time;

                    const start = Cesium.JulianDate.fromIso8601(range.min_time);
                    const stop = Cesium.JulianDate.fromIso8601(range.max_time);

                    // Set timeline bounds
                    viewer.timeline.zoomTo(start, stop);
                    viewer.clock.startTime = start.clone();
                    viewer.clock.stopTime = stop.clone();
                    viewer.clock.currentTime = stop.clone(); // Start at most recent
                    viewer.clock.clockRange = Cesium.ClockRange.CLAMPED;
                    viewer.clock.multiplier = 60; // 1 minute per second default

                    return true;
                }
                return false;
            } catch (err) {
                console.warn('Error loading history range:', err);
                return false;
            }
        }

        // Set time mode (live or history)
        async function setTimeMode(mode) {
            const btnLive = document.getElementById('tcb-btn-live');
            const btnHistory = document.getElementById('tcb-btn-history');
            const controlBar = document.getElementById('timeControlBar');
            const timeDisplay = document.getElementById('tcb-time-display');

            if (mode === 'live') {
                timeMode = 'live';

                // Update UI
                btnLive.classList.add('active');
                btnHistory.classList.remove('active');
                controlBar.classList.remove('history-active');
                timeDisplay.classList.remove('history');

                // Disable playback buttons in live mode
                enablePlaybackButtons(false);

                // Stop animation and reset to live time
                viewer.clock.shouldAnimate = false;
                viewer.clock.currentTime = Cesium.JulianDate.now();

                // Restart live clock sync
                if (!liveClockIntervalId) {
                    liveClockIntervalId = setInterval(() => {
                        if (timeMode === 'live') {
                            viewer.clock.currentTime = Cesium.JulianDate.now();
                        }
                    }, 1000);
                }

                // Clear ship entities
                SHIP_TYPES.forEach(type => {
                    if (shipDataSources[type]) {
                        shipDataSources[type].entities.removeAll();
                    }
                });

                // Reset sliding window state
                currentWindowCenter = null;
                currentWindowStart = null;
                currentWindowEnd = null;
                historyInterpolationLoaded = false;

                console.log('Switched to LIVE mode');

            } else if (mode === 'history') {
                timeMode = 'history';
                clearProximity();

                // Update UI
                btnLive.classList.remove('active');
                btnHistory.classList.add('active');
                controlBar.classList.add('history-active');
                timeDisplay.classList.add('history');

                // Enable playback buttons
                enablePlaybackButtons(true);

                // Reset speed to 60x
                currentSpeedIndex = 2;

                // Stop live clock sync
                if (liveClockIntervalId) {
                    clearInterval(liveClockIntervalId);
                    liveClockIntervalId = null;
                }

                // Clear existing ship entities (from LIVE mode)
                SHIP_TYPES.forEach(type => {
                    if (shipDataSources[type]) {
                        shipDataSources[type].entities.removeAll();
                    }
                });

                // Load history range and setup timeline
                const rangeLoaded = await loadHistoryRange();

                if (rangeLoaded) {
                    // Set initial time to most recent data point
                    const initialCenter = new Date(historyRange.max);

                    // Load 1-hour window around initial time
                    await loadHistoryWindow(initialCenter);

                    // Enable animation for smooth playback
                    viewer.clock.shouldAnimate = true;
                    viewer.clock.multiplier = 60; // 60x speed (1 min/sec)
                    forceUpdatePlaybackUI();
                } else {
                    // No history data available — return to LIVE after brief message
                    timeDisplay.textContent = 'No history data — returning to LIVE';
                    setTimeout(() => setTimeMode('live'), 2000);
                }

                console.log('Switched to HISTORY mode with sliding window');
            }
        }

        // Setup clock tick listener for history mode — window boundary detection + prefetch
        viewer.clock.onTick.addEventListener((clock) => {
            if (timeMode !== 'history') return;

            // Update time display in control bar
            const jsDate = Cesium.JulianDate.toDate(clock.currentTime);
            const displayTime = jsDate.toISOString().replace('T', ' ').substring(0, 19) + ' UTC';
            document.getElementById('tcb-time-display').textContent = displayTime;
            document.getElementById('last-update').textContent = displayTime.substring(11, 19);

            // Sync play/pause icon state
            updatePlaybackUI();

            // Window boundary detection: reload when current time exceeds 70% of window
            if (!currentWindowStart || !currentWindowEnd || isLoadingWindow) return;

            const windowDuration = currentWindowEnd.getTime() - currentWindowStart.getTime();
            const elapsed = jsDate.getTime() - currentWindowStart.getTime();
            const progress = elapsed / windowDuration;

            // If past 70% of window (forward) or before 10% (backward via scrub), load new window
            if (progress > 0.7 || progress < -0.1) {
                console.log('[HISTORY] Window boundary reached, progress:', (progress * 100).toFixed(0) + '%');
                loadHistoryWindow(jsDate, { silent: true });
            }
        });

        // Timeline scrub: detect large time jumps via debounced check
        const debouncedWindowJump = debounce((julianDate) => {
            if (timeMode !== 'history' || isLoadingWindow) return;

            const jsDate = Cesium.JulianDate.toDate(julianDate);

            // Check if jumped outside current window
            if (!currentWindowStart || !currentWindowEnd) {
                loadHistoryWindow(jsDate);
                return;
            }

            if (jsDate < currentWindowStart || jsDate > currentWindowEnd) {
                console.log('[HISTORY] Timeline jump detected, loading new window');
                loadHistoryWindow(jsDate);
            }
        }, 500);

        // Cesium timeline click/drag handler
        viewer.timeline.addEventListener('settime', () => {
            if (timeMode === 'history') {
                debouncedWindowJump(viewer.clock.currentTime);
            }
        });

        // Camera move: reload history data for new viewport (skip during animation playback)
        const debouncedViewportReload = debounce(() => {
            if (timeMode !== 'history' || isLoadingWindow || !currentWindowCenter) return;
            if (viewer.clock.shouldAnimate) return; // Don't reload while playing
            console.log('[HISTORY] Viewport changed, reloading for new bbox');
            loadHistoryWindow(currentWindowCenter, { silent: true });
        }, 800);

        viewer.camera.moveEnd.addEventListener(() => {
            if (timeMode === 'history') {
                debouncedViewportReload();
            }
        });

        // Setup mode toggle button listeners
        document.getElementById('tcb-btn-live').addEventListener('click', () => setTimeMode('live'));
        document.getElementById('tcb-btn-history').addEventListener('click', () => setTimeMode('history'));

        // Initialize: Start live clock sync
        liveClockIntervalId = setInterval(() => {
            if (timeMode === 'live') {
                viewer.clock.currentTime = Cesium.JulianDate.now();
            }
        }, 1000);
        // ── End Time Travel Mode ───────────────────────────────────────────────

        const SHIP_COLORS = {
            cargo: '#10b981',      // Cesium.Color.fromCssColorString('#10b981')
            tanker: '#f97316',
            passenger: '#0ea5e9',  // Sky blue
            fishing: '#eab308',
            military: '#ef4444',
            tug: '#a855f7',
            other: '#6b7280'
        };

        // Helper function to generate colored SVG ship icon (triangle with trail dots)
        function getShipIcon(colorHex) {
            const svg = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 32'>
                <!-- Trail dots -->
                <circle cx='12' cy='28' r='1.5' fill='${colorHex}' opacity='0.3'/>
                <circle cx='12' cy='24' r='1.8' fill='${colorHex}' opacity='0.5'/>
                <circle cx='12' cy='20' r='2' fill='${colorHex}' opacity='0.7'/>
                <!-- Ship triangle -->
                <polygon points='12,2 6,16 12,14 18,16' fill='${colorHex}'/>
            </svg>`;
            return "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
        }

        // shipDataSources and SHIP_TYPES are defined earlier (before Time Travel Mode)

        SHIP_TYPES.forEach(async (type) => {
            const ds = new Cesium.CustomDataSource(`Ships - ${type}`);
            shipDataSources[type] = ds;
            await viewer.dataSources.add(ds);
        });

        SHIP_TYPES.forEach(type => {
            const checkbox = document.getElementById(`filter-${type}`);
            if (checkbox) {
                checkbox.addEventListener('change', () => {
                    if (shipDataSources[type]) {
                        shipDataSources[type].show = checkbox.checked;
                    }
                });
            }
        });

        // Weather Imagery Layers
        let cloudLayer = null;
        let weatherProvider = null;

        // Fetch latest Rainviewer data and initialize provider asynchronously
        fetch('https://api.rainviewer.com/public/weather-maps.json')
            .then(res => res.json())
            .then(data => {
                const pastFrames = data.radar.past;
                if (pastFrames && pastFrames.length > 0) {
                    const latestTimestamp = pastFrames[pastFrames.length - 1].time;
                    weatherProvider = new Cesium.UrlTemplateImageryProvider({
                        url: `https://tilecache.rainviewer.com/v2/radar/${latestTimestamp}/256/{z}/{x}/{y}/2/1_1.png`,
                        maximumLevel: 6 // Prevent "zoom level not supported" errors by stopping requests past level 6
                    });
                    cloudLayer = viewer.imageryLayers.addImageryProvider(weatherProvider);
                    cloudLayer.alpha = 0.6; // Slightly transparent
                    cloudLayer.show = document.getElementById('layer-clouds').checked;
                }
            })
            .catch(err => console.error("Error loading Rainviewer data:", err));

        // Weather Checkbox Logic
        document.getElementById('layer-clouds').addEventListener('change', (e) => {
            if (cloudLayer) {
                cloudLayer.show = e.target.checked;
                // Move layer to front when toggled on to ensure it is always visible over the base map
                if (e.target.checked) viewer.imageryLayers.raiseToTop(cloudLayer);
            }
        });

        // ── Satellite Layer ──────────────────────────────────────────────────
        // SAT_COLORS, getSatIcon, satDataSource, and _satRecCache are defined earlier

        document.getElementById('layer-sats').addEventListener('change', (e) => {
            satDataSource.show = e.target.checked;
        });

        let _satLastApiFetch = 0;
        const SAT_API_INTERVAL_MS = 30 * 60 * 1000; // re-fetch TLE data every 30 min

        async function _refreshSatTleCache() {
            try {
                const response = await fetch('/api/v1/satellites');
                if (!response.ok) return;
                const sats = await response.json();
                const newCache = {};
                const hasSatelliteJs = typeof satellite !== 'undefined';

                sats.forEach(sat => {
                    const satId = String(sat.id);
                    let satrec = null;
                    if (hasSatelliteJs && sat.tle && sat.tle.length === 2) {
                        try {
                            satrec = satellite.twoline2satrec(sat.tle[0], sat.tle[1]);
                        } catch (e) { /* skip */ }
                    }
                    newCache[satId] = { satrec, sat };
                });
                _satRecCache = newCache;
                _satLastApiFetch = Date.now();
                document.getElementById('total-sats').textContent = sats.length;
            } catch (err) {
                console.error('Error fetching satellite TLE data:', err);
            }
        }

        function _propagateSatPositions() {
            const hasSatelliteJs = typeof satellite !== 'undefined';
            const now = new Date();

            Object.entries(_satRecCache).forEach(([satId, { satrec, sat }]) => {
                let lat, lng, altKm;

                if (hasSatelliteJs && satrec) {
                    // Real-time client-side propagation via satellite.js
                    try {
                        const posVel = satellite.propagate(satrec, now);
                        if (!posVel.position) return;
                        const gmst = satellite.gstime(now);
                        const geodetic = satellite.eciToGeodetic(posVel.position, gmst);
                        lat = satellite.degreesLat(geodetic.latitude);
                        lng = satellite.degreesLong(geodetic.longitude);
                        altKm = geodetic.height;
                    } catch (e) {
                        // Fall back to last known API position
                        lat = sat.lat; lng = sat.lng; altKm = sat.alt_km || 0;
                    }
                } else {
                    // satellite.js unavailable; use last known position from API
                    lat = sat.lat; lng = sat.lng; altKm = sat.alt_km || 0;
                }

                const color = SAT_COLORS[sat.mission] || '#94a3b8';
                const position = Cesium.Cartesian3.fromDegrees(lng, lat, altKm * 1000);

                let entity = satDataSource.entities.getById(satId);
                if (!entity) {
                    satDataSource.entities.add({
                        id: satId,
                        name: sat.name,
                        description: `
                            <table class="cesium-infoBox-defaultTable"><tbody>
                                <tr><th>Name</th><td>${sat.name}</td></tr>
                                <tr><th>NORAD ID</th><td>${sat.id}</td></tr>
                                <tr><th>Country</th><td>${sat.country || 'UNKNOWN'}</td></tr>
                                <tr><th>Mission</th><td>${sat.sat_type || sat.mission || '-'}</td></tr>
                                <tr><th>Altitude</th><td>${Math.round(altKm)} km</td></tr>
                                <tr><th>Speed</th><td>${sat.speed_knots} kts</td></tr>
                                ${sat.wiki ? `<tr><th>Info</th><td><a href="${sat.wiki}" target="_blank">Wikipedia</a></td></tr>` : ''}
                            </tbody></table>
                        `,
                        position: new Cesium.CallbackProperty(() =>
                            satDataSource.entities.getById(satId)?._currentPosition || position
                            , false),
                        billboard: {
                            image: getSatIcon(color),
                            width: 18,
                            height: 18,
                            scaleByDistance: new Cesium.NearFarScalar(1.5e7, 1.5, 8.0e7, 0.5),
                            disableDepthTestDistance: Number.POSITIVE_INFINITY
                        },
                        label: {
                            text: sat.name,
                            font: '10px JetBrains Mono, monospace',
                            fillColor: Cesium.Color.fromCssColorString(color),
                            outlineColor: Cesium.Color.BLACK,
                            outlineWidth: 2,
                            style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                            pixelOffset: new Cesium.Cartesian2(0, -20),
                            distanceDisplayCondition: new Cesium.DistanceDisplayCondition(0, 2e7),
                            disableDepthTestDistance: Number.POSITIVE_INFINITY
                        }
                    });
                }
                // Update position directly on entity
                const e = satDataSource.entities.getById(satId);
                if (e) e.position = position;
            });

            // Remove entities not in cache anymore
            const cacheIds = new Set(Object.keys(_satRecCache));
            satDataSource.entities.values
                .filter(e => !cacheIds.has(e.id))
                .forEach(e => satDataSource.entities.remove(e));
        }

        // Initial TLE load
        _refreshSatTleCache().then(() => _propagateSatPositions());

        // Refresh TLE data from API every 30 minutes (only in LIVE mode)
        setInterval(async () => {
            if (timeMode === 'live') {
                await _refreshSatTleCache();
            }
        }, SAT_API_INTERVAL_MS);

        // Re-propagate positions every 5 seconds (local calculation, no API call)
        // Only propagate in LIVE mode; HISTORY mode uses sliding window
        setInterval(() => {
            if (timeMode === 'live') {
                _propagateSatPositions();
            }
        }, 5000);
        // ── End Satellite Layer ───────────────────────────────────────────────


        // Live ship data lookup — CallbackProperty reads from here for always-fresh InfoBox
        const shipDataMap = {};

        // ── Vessel Proximity Distance ────────────────────────────────────────
        const PROXIMITY_RADIUS_NM = 10;
        const PROXIMITY_MAX_COUNT = 10;
        const PROXIMITY_THROTTLE_MS = 2000;
        let selectedProximityMmsi = null;  // stores raw MMSI value (same type as shipDataMap keys)
        let lastProximityUpdate = 0;
        let proximityMissCount = 0; // consecutive WS updates where selected vessel is absent
        let latestWsShipsMmsis = new Set(); // tracks MMSIs from latest WebSocket payload

        const proximityDataSource = new Cesium.CustomDataSource('Proximity');
        viewer.dataSources.add(proximityDataSource);

        /**
         * Haversine distance between two points in decimal degrees.
         * Returns distance in nautical miles.
         */
        function haversineNm(lat1, lon1, lat2, lon2) {
            const R = 3440.065; // Earth radius in nautical miles
            const toRad = Math.PI / 180;
            const dLat = (lat2 - lat1) * toRad;
            const dLon = (lon2 - lon1) * toRad;
            const a = Math.sin(dLat / 2) ** 2 +
                      Math.cos(lat1 * toRad) * Math.cos(lat2 * toRad) *
                      Math.sin(dLon / 2) ** 2;
            return 2 * R * Math.asin(Math.sqrt(a));
        }

        /**
         * Find nearby vessels within radius, sorted by distance, max count.
         * Only includes vessels present in the latest WebSocket payload (not stale).
         */
        function findNearbyVessels(mmsi, radiusNm, maxCount) {
            const selected = shipDataMap[mmsi];
            if (!selected) return [];

            const results = [];
            for (const [key, vessel] of Object.entries(shipDataMap)) {
                if (key == mmsi) continue; // == for loose type comparison (number/string)
                if (!latestWsShipsMmsis.has(vessel.mmsi)) continue; // use vessel's own mmsi for Set lookup

                const dist = haversineNm(selected.lat, selected.lng, vessel.lat, vessel.lng);
                if (dist <= radiusNm) {
                    results.push({
                        mmsi: vessel.mmsi,
                        name: vessel.name || 'UNKNOWN',
                        distance: dist,
                        lat: vessel.lat,
                        lng: vessel.lng
                    });
                }
            }

            results.sort((a, b) => a.distance - b.distance);
            return results.slice(0, maxCount);
        }

        function proximityColor(distNm) {
            if (distNm < 2) return { css: '#ef4444', cesium: Cesium.Color.fromCssColorString('#ef4444') };
            if (distNm < 5) return { css: '#eab308', cesium: Cesium.Color.fromCssColorString('#eab308') };
            return { css: '#10b981', cesium: Cesium.Color.fromCssColorString('#10b981') };
        }

        function renderProximityLines(selectedMmsi, nearbyVessels) {
            proximityDataSource.entities.removeAll();
            const selected = shipDataMap[selectedMmsi];
            if (!selected || nearbyVessels.length === 0) return;

            const closestMmsi = nearbyVessels[0].mmsi;

            nearbyVessels.forEach(nv => {
                const color = proximityColor(nv.distance);
                const isClosest = nv.mmsi === closestMmsi;

                // Polyline
                proximityDataSource.entities.add({
                    id: `prox-line-${nv.mmsi}`,
                    polyline: {
                        positions: new Cesium.CallbackProperty(() => {
                            const sel = shipDataMap[selectedMmsi];
                            const tgt = shipDataMap[nv.mmsi];
                            if (!sel || !tgt) return [];
                            return Cesium.Cartesian3.fromDegreesArray([
                                sel.lng, sel.lat, tgt.lng, tgt.lat
                            ]);
                        }, false),
                        width: isClosest ? 3 : 2,
                        material: isClosest
                            ? new Cesium.PolylineGlowMaterialProperty({
                                color: new Cesium.CallbackProperty(() => {
                                    const alpha = 0.4 + 0.6 * Math.abs(Math.sin(Date.now() / 500));
                                    return color.cesium.withAlpha(alpha);
                                }, false),
                                glowPower: 0.3
                            })
                            : new Cesium.ColorMaterialProperty(color.cesium.withAlpha(0.6)),
                        clampToGround: false
                    }
                });

                // Label at midpoint
                proximityDataSource.entities.add({
                    id: `prox-label-${nv.mmsi}`,
                    position: new Cesium.CallbackProperty(() => {
                        const sel = shipDataMap[selectedMmsi];
                        const tgt = shipDataMap[nv.mmsi];
                        if (!sel || !tgt) return Cesium.Cartesian3.fromDegrees(0, 0);
                        return Cesium.Cartesian3.fromDegrees(
                            (sel.lng + tgt.lng) / 2,
                            (sel.lat + tgt.lat) / 2
                        );
                    }, false),
                    label: {
                        text: new Cesium.CallbackProperty(() => {
                            const sel = shipDataMap[selectedMmsi];
                            const tgt = shipDataMap[nv.mmsi];
                            if (!sel || !tgt) return '';
                            const d = haversineNm(sel.lat, sel.lng, tgt.lat, tgt.lng);
                            return d.toFixed(1) + ' nm';
                        }, false),
                        font: '12px JetBrains Mono',
                        fillColor: color.cesium,
                        outlineColor: Cesium.Color.BLACK,
                        outlineWidth: 3,
                        style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                        pixelOffset: new Cesium.Cartesian2(0, -12),
                        disableDepthTestDistance: Number.POSITIVE_INFINITY
                    }
                });
            });
        }

        function renderNearbyPanel(nearbyVessels) {
            const section = document.getElementById('nearbyVesselsSection');
            const list = document.getElementById('nearbyVesselsList');

            if (nearbyVessels.length === 0) {
                section.style.display = 'none';
                return;
            }

            section.style.display = 'block';
            list.innerHTML = nearbyVessels.map(nv => {
                const color = proximityColor(nv.distance);
                return `<div class="nearby-row" data-mmsi="${nv.mmsi}" data-lat="${nv.lat}" data-lng="${nv.lng}">
                    <span class="nearby-dot" style="background:${color.css}"></span>
                    <span class="nearby-name">${nv.name}</span>
                    <span class="nearby-dist">${nv.distance.toFixed(1)} nm</span>
                </div>`;
            }).join('');

            // Click handler: fly to vessel
            list.querySelectorAll('.nearby-row').forEach(row => {
                row.addEventListener('click', () => {
                    const lat = parseFloat(row.dataset.lat);
                    const lng = parseFloat(row.dataset.lng);
                    viewer.camera.flyTo({
                        destination: Cesium.Cartesian3.fromDegrees(lng, lat, 50000)
                    });
                });
            });
        }

        function clearProximity() {
            selectedProximityMmsi = null;
            proximityMissCount = 0;
            proximityDataSource.entities.removeAll();
            const section = document.getElementById('nearbyVesselsSection');
            if (section) section.style.display = 'none';
        }

        function updateProximity() {
            if (!selectedProximityMmsi || timeMode !== 'live') {
                clearProximity();
                return;
            }
            // Tolerate 2 consecutive misses before clearing (spec requirement)
            if (!latestWsShipsMmsis.has(selectedProximityMmsi)) {
                proximityMissCount++;
                if (proximityMissCount >= 2) {
                    clearProximity();
                }
                return;
            }
            proximityMissCount = 0; // reset on successful match
            const nearby = findNearbyVessels(selectedProximityMmsi, PROXIMITY_RADIUS_NM, PROXIMITY_MAX_COUNT);
            renderProximityLines(selectedProximityMmsi, nearby);
            renderNearbyPanel(nearby);
        }
        // ── End Vessel Proximity Distance ────────────────────────────────────

        function updateShipsLayer(ships) {
            const byType = {};
            SHIP_TYPES.forEach(t => byType[t] = []);

            // Update lookup map with latest data
            ships.forEach(s => { shipDataMap[s.mmsi] = s; });

            ships.forEach(ship => {
                const type = ship.type || 'other';
                if (byType[type]) byType[type].push(ship);
                else byType['other'].push(ship);
            });

            // Get current camera bounding box (Viewport Culling)
            // Default to full world bounds in DEGREES
            let west = -180;
            let east = 180;
            let south = -90;
            let north = 90;

            // In HISTORY mode, skip viewport culling to show all ships
            // In LIVE mode, apply viewport culling for performance
            if (timeMode === 'live') {
                const cameraRect = viewer.camera.computeViewRectangle();
                if (cameraRect) {
                    const buffer = 0.5; // degrees
                    west = Cesium.Math.toDegrees(cameraRect.west) - buffer;
                    east = Cesium.Math.toDegrees(cameraRect.east) + buffer;
                    south = Cesium.Math.toDegrees(cameraRect.south) - buffer;
                    north = Cesium.Math.toDegrees(cameraRect.north) + buffer;
                }
            }

            // Limit the max number of ships we show at once per type
            // HISTORY mode: higher limit since we want to see all historical data
            // LIVE mode: lower limit for real-time performance
            const MAX_SHIPS_PER_TYPE = (timeMode === 'history') ? 2000 : 400;
            let totalRendered = 0;

            SHIP_TYPES.forEach(type => {
                const ds = shipDataSources[type];
                if (!ds) return;

                const typeShips = byType[type];
                const existingIds = new Set();
                let typeRenderedCount = 0;

                typeShips.forEach(ship => {
                    // Culling: Check if ship is within camera bounds
                    if (typeRenderedCount >= MAX_SHIPS_PER_TYPE) return;
                    if (ship.lng < west || ship.lng > east || ship.lat < south || ship.lat > north) return;

                    typeRenderedCount++;
                    totalRendered++;
                    existingIds.add(ship.mmsi);
                    let entity = ds.entities.getById(ship.mmsi);
                    const position = Cesium.Cartesian3.fromDegrees(ship.lng, ship.lat);

                    if (!entity) {
                        const mmsiKey = ship.mmsi;
                        // Description reads from shipDataMap so it always reflects latest data
                        const desc = new Cesium.CallbackProperty(() => {
                            const s = shipDataMap[mmsiKey] || ship;
                            let rows = `
                                    <tr><th>Name</th><td>${s.name}</td></tr>
                                    <tr><th>MMSI</th><td>${s.mmsi}</td></tr>
                                    <tr><th>Type</th><td>${s.type}</td></tr>
                                    <tr><th>Country</th><td>${s.country || 'UNKNOWN'}</td></tr>
                                    <tr><th>SOG</th><td>${s.sog || 0} kts</td></tr>
                                    <tr><th>COG</th><td>${s.cog || 0}°</td></tr>
                                    <tr><th>Heading</th><td>${s.heading || 0}°</td></tr>`;
                            if (s.length) rows += `<tr><th>Length</th><td>${s.length} m</td></tr>`;
                            if (s.beam) rows += `<tr><th>Beam</th><td>${s.beam} m</td></tr>`;
                            if (s.draught) rows += `<tr><th>Draught</th><td>${s.draught} m</td></tr>`;
                            if (s.destination && s.destination !== 'UNKNOWN') rows += `<tr><th>Destination</th><td>${s.destination}</td></tr>`;
                            if (s.eta) rows += `<tr><th>ETA</th><td>${s.eta}</td></tr>`;
                            if (s.callsign) rows += `<tr><th>Callsign</th><td>${s.callsign}</td></tr>`;
                            if (s.imo) rows += `<tr><th>IMO</th><td>${s.imo}</td></tr>`;
                            return `<table class="cesium-infoBox-defaultTable"><tbody>${rows}</tbody></table>`;
                        }, false);

                        ds.entities.add({
                            id: ship.mmsi,
                            name: ship.name,
                            description: desc,
                            position: position,
                            billboard: {
                                image: getShipIcon(SHIP_COLORS[type]),
                                width: 14,
                                height: 16,
                                rotation: new Cesium.CallbackProperty(() => {
                                    const s = shipDataMap[mmsiKey] || ship;
                                    return Cesium.Math.toRadians(-(s.heading || 0));
                                }, false)
                            }
                        });
                    } else {
                        // Directly update position
                        entity.position = position;
                    }
                });

                ds.entities.values.forEach(entity => {
                    // Only remove ships that are no longer in our WebSocket update 
                    // (existingIds contains ALL ships in this type from the WebSocket payload, regardless of culling)
                    let stillExists = false;
                    for (let i = 0; i < typeShips.length; i++) {
                        if (typeShips[i].mmsi === entity.id) {
                            stillExists = true;
                            // Update visibility based on culling bounds
                            const ship = typeShips[i];
                            const inBounds = (ship.lng >= west && ship.lng <= east && ship.lat >= south && ship.lat <= north);
                            entity.show = inBounds;
                            break;
